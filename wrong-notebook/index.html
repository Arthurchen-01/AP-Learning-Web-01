<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>错题本 - AP Learning</title>
  <script>
    var m = location.pathname.match(/^\/(AP-Learning-Web-0\d)(?:\/|$)/);
    window._b = m ? '/' + m[1] : '';
    window.sitePath = function(p) {
      if (/^(?:[a-z]+:)?\/\//i.test(p)) return p;
      var n = p.startsWith('/') ? p : '/' + p;
      return window._b + n;
    };
  </script>
  <script>document.write('<scr'+'ipt src="'+window._b+'/assets/site-base.js"><\/scr'+'ipt>');</script>
  <link rel="stylesheet" href="../assets/global-theme.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    body { overflow-x: hidden; }

    /* ===== Page Heading ===== */
    .page-heading { margin-bottom: 24px; }
    .page-heading h1 { font-size: 1.6rem; margin-bottom: 6px; }
    .page-heading p { color: var(--text-muted); font-size: 0.95rem; }

    /* ===== Stats Row ===== */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      padding: 18px 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--card-bg);
      box-shadow: var(--shadow-soft);
    }
    .stat-card .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .stat-card .stat-label {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .stat-card.danger .stat-value { color: var(--danger); }
    .stat-card.warning .stat-value { color: var(--warning); }
    .stat-card.success .stat-value { color: var(--success); }
    .stat-card.accent .stat-value { color: var(--accent-strong); }

    /* ===== Mastery Section ===== */
    .mastery-section {
      margin-bottom: 28px;
    }
    .mastery-section h2 {
      font-size: 1.1rem;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mastery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .mastery-card {
      padding: 16px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--card-bg);
    }
    .mastery-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .mastery-card-header .subject-name {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .mastery-card-header .mastery-pct {
      font-weight: 800;
      font-size: 1.1rem;
    }
    .mastery-bar-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(236, 213, 193, 0.5);
      overflow: hidden;
      margin-bottom: 8px;
    }
    [data-theme="dark"] .mastery-bar-track {
      background: rgba(51, 65, 85, 0.6);
    }
    .mastery-bar-fill {
      height: 100%;
      border-radius: inherit;
      transition: width 0.4s ease;
    }
    .mastery-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ===== Filter Bar ===== */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }
    .filter-btn {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card-bg);
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent-strong); }
    .filter-btn.is-active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent-strong);
    }
    .filter-select {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }

    /* ===== Subject Group ===== */
    .subject-group {
      margin-bottom: 28px;
    }
    .subject-group-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      margin-bottom: 12px;
      border-bottom: 2px solid var(--border);
      cursor: pointer;
    }
    .subject-group-header:hover { border-color: var(--accent); }
    .subject-group-title {
      font-size: 1.05rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .subject-group-title .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      padding: 0 6px;
      border-radius: 999px;
      background: var(--danger);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .subject-group-toggle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* ===== Exam Sub-group ===== */
    .exam-subgroup {
      margin-bottom: 16px;
      margin-left: 0;
    }
    .exam-subgroup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      margin-bottom: 8px;
      background: rgba(232, 146, 85, 0.06);
      border-radius: 8px;
      cursor: pointer;
    }
    [data-theme="dark"] .exam-subgroup-header {
      background: rgba(59, 130, 246, 0.06);
    }
    .exam-subgroup-header:hover { background: rgba(232, 146, 85, 0.12); }
    [data-theme="dark"] .exam-subgroup-header:hover { background: rgba(59, 130, 246, 0.12); }
    .exam-subgroup-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }
    .exam-subgroup-meta {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    /* ===== Question Card ===== */
    .q-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--card-bg);
      margin-bottom: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .q-card:hover { border-color: var(--accent); }
    .q-card.is-flagged { border-left: 3px solid var(--warning); }

    .q-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 14px 18px;
      cursor: pointer;
      gap: 12px;
    }
    .q-card-header:hover { background: rgba(255,255,255,0.02); }
    [data-theme="dark"] .q-card-header:hover { background: rgba(255,255,255,0.03); }

    .q-card-left { flex: 1; min-width: 0; }
    .q-card-title {
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .q-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .q-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
    }
    .q-tag.wrong { background: rgba(239,68,68,0.1); color: var(--danger); }
    .q-tag.correct { background: rgba(34,197,94,0.1); color: var(--success); }
    .q-tag.flagged { background: rgba(245,158,11,0.12); color: var(--warning); }
    .q-tag.section { background: rgba(59,130,246,0.1); color: #3b82f6; }
    .q-tag.kp { background: rgba(139,92,246,0.1); color: #8b5cf6; }

    .q-card-toggle {
      font-size: 1rem;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .q-card-body {
      display: none;
      padding: 0 18px 18px;
    }
    .q-card-body.open { display: block; }

    .q-text {
      font-size: 0.92rem;
      line-height: 1.7;
      margin-bottom: 14px;
      color: var(--text);
    }

    .q-options {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }
    .q-option {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .q-option .opt-key {
      font-weight: 800;
      min-width: 22px;
      flex-shrink: 0;
    }
    .q-option.is-correct {
      border-color: var(--success);
      background: rgba(34,197,94,0.07);
    }
    .q-option.is-correct .opt-key { color: var(--success); }
    .q-option.is-wrong {
      border-color: var(--danger);
      background: rgba(239,68,68,0.07);
    }
    .q-option.is-wrong .opt-key { color: var(--danger); }

    .q-answers-row {
      display: flex;
      gap: 20px;
      margin-bottom: 14px;
      font-size: 0.88rem;
      font-weight: 600;
    }
    .q-answers-row .your-answer { color: var(--danger); }
    .q-answers-row .correct-answer { color: var(--success); }

    .q-explanation {
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--text-muted);
      padding: 12px 14px;
      background: var(--bg);
      border-radius: 10px;
      margin-bottom: 14px;
    }
    .q-explanation strong { color: var(--text); }

    .q-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .q-btn {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      transition: all 0.15s;
    }
    .q-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .q-btn-danger { color: var(--danger); border-color: var(--danger); }
    .q-btn-success { color: var(--success); border-color: var(--success); }
    .q-btn-primary {
      background: var(--accent-soft);
      color: var(--accent-strong);
      border-color: var(--accent);
    }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--card-bg);
    }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .empty-state p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; line-height: 1.6; }

    /* ===== Responsive ===== */
    @media (max-width: 720px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 14px 16px; }
      .stat-card .stat-value { font-size: 1.4rem; }
      .mastery-grid { grid-template-columns: 1fr; }
      .q-card-header { padding: 12px 14px; }
      .q-card-body { padding: 0 14px 14px; }
      .filter-bar { gap: 8px; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body data-page="v2-wrong-notebook">
  <header class="site-header">
    <div class="shell nav">
      <a class="brand" id="nav-brand">

  <main class="page-main shell">

    <!-- Stats Overview -->

      <div class="stat-card warning">

      </div>
      <div class="stat-card success">
        <div class="stat-value" id="stat-mastered">0</div>

      </div>
      <div class="stat-card accent">
        <div class="stat-value" id="stat-subjects">0</div>

      <button class="filter-btn" data-filter="flagged" onclick="setFilter('flagged', this)">🚩 仅标记</button>

  <footer class="shell" style="padding:32px 0;text-align:center;color:var(--text-muted);font-size:0.82rem;">
    <p>Local AP practice workspace.</p>
  </footer>

  <script type="module">
    import { loadWrongQuestions, removeWrongQuestion, loadUserProgress } from '../assets/js/exam-engine.js';
    import { loadExamIndex } from '../assets/js/data-service.js';

    // ========== Constants ==========
    const PRACTICED_KEY = 'ap-learning-wrong-practiced';

    // ========== Subject Name Map ==========
    const SUBJECT_NAMES = {
      'calculus_bc': 'AP Calculus BC',
      'calculus_ab': 'AP Calculus AB',
      'statistics': 'AP Statistics',
      'microeconomics': 'AP Microeconomics',
      'macroeconomics': 'AP Macroeconomics',
      'physics_1': 'AP Physics 1',
      'physics_2': 'AP Physics 2',
      'physics_c_em': 'AP Physics C: E&M',
      'physics_c_mechanics': 'AP Physics C: Mechanics',
      'biology': 'AP Biology',
      'chemistry': 'AP Chemistry',
      'psychology': 'AP Psychology',
      'computer_science_a': 'AP Computer Science A',
      'english_lang': 'AP English Language',
      'english_lit': 'AP English Literature',
      'us_history': 'AP US History',
      'world_history': 'AP World History',
    };

    // ========== State ==========
    let allWrongQuestions = [];
    let flaggedQuestions = [];
    let examCatalog = [];
    let currentFilter = 'all';
    let currentSubject = '';
    let masteredSet = new Set();

    // ========== Helpers ==========
    function getPracticed() {
      try { return JSON.parse(localStorage.getItem(PRACTICED_KEY) || '{}'); } catch { return {}; }
    }

    function markMastered(questionId) {
      const p = getPracticed();
      p[questionId] = 'mastered';
      localStorage.setItem(PRACTICED_KEY, JSON.stringify(p));
      masteredSet.add(questionId);
    }

    function unmarkMastered(questionId) {
      const p = getPracticed();
      delete p[questionId];
      localStorage.setItem(PRACTICED_KEY, JSON.stringify(p));
      masteredSet.delete(questionId);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function truncate(str, len) {
      str = str || '';
      return str.length > len ? str.substring(0, len) + '...' : str;
    }

    function getSubjectName(subjectKey) {
      return SUBJECT_NAMES[subjectKey] || subjectKey || 'Unknown';
    }

    function getSubjectFromExamId(examId) {
      const exam = examCatalog.find(e => e.exam_id === examId);
      return exam ? exam.subject : '';
    }

    function getExamTitle(examId) {
      const exam = examCatalog.find(e => e.exam_id === examId);
      return exam ? exam.exam_title : examId;
    }

    function getMasteryColor(pct) {
      if (pct >= 80) return 'var(--success)';
      if (pct >= 50) return 'var(--warning)';
      return 'var(--danger)';
    }

    // ========== Scan localStorage for exam states with flagged questions ==========
    function scanExamStatesForFlagged() {
      const flagged = [];
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (!key.startsWith('ap-learning-exam:')) continue;
        try {
          const state = JSON.parse(localStorage.getItem(key));
          if (!state || !state.sections) continue;
          const examId = key.replace('ap-learning-exam:', '');

          state.sections.forEach((sec, sIdx) => {
            if (!sec.flagged) return;
            sec.flagged.forEach((isFlagged, qIdx) => {
              if (isFlagged) {
                flagged.push({
                  exam_id: examId,
                  sectionIndex: sIdx,
                  questionIndex: qIdx,
                  section_id: sec.section_id,
                  isFlaggedFromState: true
                });
              }
            });
          });
        } catch(e) {}
      }
      return flagged;
    }

    // ========== Data Loading ==========
    async function init() {
      // Load exam catalog
      examCatalog = await loadExamIndex();

      // Load wrong questions from dedicated key
      allWrongQuestions = loadWrongQuestions();

      // Load mastered set
      const practiced = getPracticed();
      masteredSet = new Set(
        Object.entries(practiced)
          .filter(([, v]) => v === 'mastered')
          .map(([k]) => k)
      );

      // Scan for flagged questions from active exam states
      const flaggedFromStates = scanExamStatesForFlagged();
      // Filter out flagged items that are already in wrong questions
      const wrongQIds = new Set(allWrongQuestions.map(q => q.question_id));
      const uniqueFlagged = flaggedFromStates.filter(f => {
        const compositeId = `${f.exam_id}:${f.section_id}:${f.questionIndex}`;
        return !wrongQIds.has(compositeId) && !wrongQIds.has(`${f.exam_id}_q${f.questionIndex + 1}`);
      });

      // Enrich flagged questions with question data from exam files
      flaggedQuestions = await enrichFlaggedQuestions(uniqueFlagged);

      render();
    }

    async function enrichFlaggedQuestions(flaggedItems) {
      const enriched = [];
      const examCache = {};

      for (const item of flaggedItems) {
        try {
          if (!examCache[item.exam_id]) {
            const res = await fetch(`../data/${item.exam_id}/questions.json`);
            examCache[item.exam_id] = res.ok ? await res.json() : null;
          }
          const questions = examCache[item.exam_id];
          if (!questions) continue;

          // Find the question by section and index
          const sectionQuestions = questions.filter(q => q.section_id === item.section_id);
          const q = sectionQuestions[item.questionIndex];
          if (q) {
            enriched.push({
              ...q,
              isFlagged: true,
              isFromActiveExam: true,
              userAnswer: null,
              correctAnswer: q.correct_answer
            });
          }
        } catch(e) {}
      }
      return enriched;
    }

    // ========== Render ==========
    function render() {
      const practiced = getPracticed();

      // Combine wrong + flagged
      let allItems = [
        ...allWrongQuestions.map(q => ({ ...q, isWrong: true, isFlagged: q.isFlagged || false })),
        ...flaggedQuestions.filter(fq => !allWrongQuestions.some(wq => wq.question_id === fq.question_id))
      ];

      // Apply mastered status
      allItems = allItems.map(item => ({
        ...item,
        isMastered: masteredSet.has(item.question_id)
      }));

      // Count stats
      const totalWrong = allWrongQuestions.length;
      const totalFlagged = flaggedQuestions.length + allWrongQuestions.filter(q => q.isFlagged).length;
      const totalMastered = allItems.filter(q => q.isMastered).length;

      // Get unique subjects
      const subjectSet = new Set();
      allItems.forEach(q => {
        const subj = q.subject || getSubjectFromExamId(q.exam_id);
        if (subj) subjectSet.add(subj);
      });

      // Update stats
      document.getElementById('stat-total-wrong').textContent = totalWrong;
      document.getElementById('stat-flagged').textContent = totalFlagged;
      document.getElementById('stat-mastered').textContent = totalMastered;
      document.getElementById('stat-subjects').textContent = subjectSet.size;
      document.getElementById('subtitle').textContent =
        `共收集 ${totalWrong} 道错题，${totalFlagged} 道标记题，涉及 ${subjectSet.size} 个科目`;

      // Populate subject filter
      const subjectFilter = document.getElementById('subject-filter');
      const currentSubjectVal = subjectFilter.value;
      subjectFilter.innerHTML = '<option value="">全部科目</option>';
      [...subjectSet].sort().forEach(subj => {
        const opt = document.createElement('option');
        opt.value = subj;
        opt.textContent = getSubjectName(subj);
        if (subj === currentSubjectVal) opt.selected = true;
        subjectFilter.appendChild(opt);
      });

      // Render mastery cards
      renderMasteryCards(allItems, subjectSet);

      // Apply filters
      let filtered = allItems;
      if (currentFilter === 'wrong') {
        filtered = filtered.filter(q => q.isWrong && !q.isMastered);
      } else if (currentFilter === 'flagged') {
        filtered = filtered.filter(q => q.isFlagged);
      }
      if (currentSubject) {
        filtered = filtered.filter(q => {
          const subj = q.subject || getSubjectFromExamId(q.exam_id);
          return subj === currentSubject;
        });
      }

      // Show/hide empty state
      const listEl = document.getElementById('question-list');
      const emptyEl = document.getElementById('empty-state');
      if (filtered.length === 0) {
        listEl.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      // Group by subject, then by exam
      const grouped = {};
      filtered.forEach(q => {
        const subj = q.subject || getSubjectFromExamId(q.exam_id) || 'unknown';
        if (!grouped[subj]) grouped[subj] = {};
        const examGroup = q.exam_id || 'unknown';
        if (!grouped[subj][examGroup]) grouped[subj][examGroup] = [];
        grouped[subj][examGroup].push(q);
      });

      let html = '';
      const subjectKeys = Object.keys(grouped).sort((a, b) => getSubjectName(a).localeCompare(getSubjectName(b)));

      subjectKeys.forEach(subj => {
        const exams = grouped[subj];
        const totalInSubject = Object.values(exams).reduce((s, arr) => s + arr.length, 0);
        const subjectId = 'subj-' + subj.replace(/[^a-zA-Z0-9]/g, '_');

        html += `<div class="subject-group" id="${subjectId}">`;
        html += `<div class="subject-group-header" onclick="toggleGroup('${subjectId}')">
          <div class="subject-group-title">
            📚 ${escapeHtml(getSubjectName(subj))}
            <span class="count-badge">${totalInSubject}</span>
          </div>
          <span class="subject-group-toggle" id="toggle-${subjectId}">▼ 收起</span>
        </div>`;
        html += `<div class="subject-group-body" id="body-${subjectId}">`;

        const examKeys = Object.keys(exams).sort();
        examKeys.forEach(examId => {
          const questions = exams[examId];
          const examTitle = getExamTitle(examId);
          const examGroupId = subjectId + '-' + examId.replace(/[^a-zA-Z0-9]/g, '_');

          html += `<div class="exam-subgroup">`;
          html += `<div class="exam-subgroup-header" onclick="toggleGroup('${examGroupId}')">
            <span class="exam-subgroup-title">📄 ${escapeHtml(examTitle)} (${questions.length}题)</span>
            <span class="exam-subgroup-meta" id="toggle-${examGroupId}">▼</span>
          </div>`;
          html += `<div id="body-${examGroupId}">`;

          questions.forEach((q, idx) => {
            const qId = q.question_id || `${q.exam_id}-${idx}`;
            const safeId = 'q-' + qId.replace(/[^a-zA-Z0-9]/g, '_') + '-' + idx;
            const isExpanded = false;
            const isMastered = q.isMastered;
            const isWrong = q.isWrong && q.userAnswer !== undefined && q.userAnswer !== null;
            const isFlagged = q.isFlagged;

            // Build plain text preview
            const preview = q.question_text || stripHtml(q.question_html || '');

            html += `<div class="q-card ${isFlagged ? 'is-flagged' : ''}" data-id="${escapeHtml(qId)}">`;
            html += `<div class="q-card-header" onclick="toggleCard('${safeId}')">`;
            html += `<div class="q-card-left">`;
            html += `<div class="q-card-title">${escapeHtml(truncate(preview, 120))}</div>`;
            html += `<div class="q-card-tags">`;
            if (isWrong) {
              html += `<span class="q-tag wrong">❌ 选了 ${escapeHtml(String(q.userAnswer))}</span>`;
              html += `<span class="q-tag correct">✅ ${escapeHtml(String(q.correctAnswer || q.correct_answer))}</span>`;
            }
            if (isFlagged) {
              html += `<span class="q-tag flagged">🚩 标记</span>`;
            }
            if (isMastered) {
              html += `<span class="q-tag correct">✅ 已掌握</span>`;
            }
            if (q.section_id) {
              html += `<span class="q-tag section">${escapeHtml(q.section_id)}</span>`;
            }
            if (q.knowledge_points && q.knowledge_points.length > 0) {
              q.knowledge_points.slice(0, 2).forEach(kp => {
                html += `<span class="q-tag kp">${escapeHtml(kp)}</span>`;
              });
            }
            html += `</div>`; // tags
            html += `</div>`; // left
            html += `<span class="q-card-toggle" id="icon-${safeId}">▶</span>`;
            html += `</div>`; // header

            html += `<div class="q-card-body" id="body-${safeId}">`;

            // Question text (rendered with HTML/KaTeX)
            html += `<div class="q-text">${q.question_html || escapeHtml(q.question_text || '')}</div>`;

            // Options
            if (q.options && q.options.length > 0) {
              html += `<div class="q-options">`;
              q.options.forEach(opt => {
                const correctKey = q.correctAnswer || q.correct_answer;
                const isCorrect = opt.key === correctKey;
                const isWrongOpt = isWrong && opt.key === q.userAnswer;
                const cls = isCorrect ? 'is-correct' : (isWrongOpt ? 'is-wrong' : '');
                html += `<div class="q-option ${cls}">
                  <span class="opt-key">${escapeHtml(opt.key)}.</span>
                  <span>${opt.html || escapeHtml(opt.text || '')}</span>
                </div>`;
              });
              html += `</div>`;
            }

            // Answer summary
            if (isWrong) {
              html += `<div class="q-answers-row">
                <span class="your-answer">❌ 你的答案：${escapeHtml(String(q.userAnswer))}</span>
                <span class="correct-answer">✅ 正确答案：${escapeHtml(String(q.correctAnswer || q.correct_answer))}</span>
              </div>`;
            }

            // Explanation
            if (q.explanation) {
              html += `<div class="q-explanation"><strong>💡 解析：</strong>${q.explanation}</div>`;
            }

            // Actions
            html += `<div class="q-actions">`;
            if (!isMastered) {
              html += `<button class="q-btn q-btn-success" onclick="event.stopPropagation();doMaster('${escapeHtml(qId)}')">✅ 标记已掌握</button>`;
            } else {
              html += `<button class="q-btn" onclick="event.stopPropagation();doUnmaster('${escapeHtml(qId)}')">↩ 取消掌握</button>`;
            }
            html += `<button class="q-btn q-btn-danger" onclick="event.stopPropagation();doRemove('${escapeHtml(qId)}')">🗑 移除</button>`;
            html += `<a class="q-btn q-btn-primary" href="paper.html?exam=${encodeURIComponent(q.exam_id)}" target="_blank">📝 重做此卷</a>`;
            html += `</div>`;

            html += `</div>`; // body
            html += `</div>`; // q-card
          });

          html += `</div></div>`; // exam subgroup body + subgroup
        });

        html += `</div></div>`; // subject body + group
      });

      listEl.innerHTML = html;

      // Render math
      renderKatex();
    }

    function renderMasteryCards(allItems, subjectSet) {
      const section = document.getElementById('mastery-section');
      const grid = document.getElementById('mastery-grid');

      if (subjectSet.size === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      let html = '';

      // Calculate per-subject stats from user progress AND wrong questions
      const progress = loadUserProgress();
      const subjectStats = {};

      // From wrong questions - calculate what we can
      allItems.forEach(q => {
        const subj = q.subject || getSubjectFromExamId(q.exam_id) || 'unknown';
        if (!subjectStats[subj]) {
          subjectStats[subj] = { wrong: 0, mastered: 0, total: 0 };
        }
        subjectStats[subj].total++;
        if (q.isMastered) {
          subjectStats[subj].mastered++;
        } else if (q.isWrong) {
          subjectStats[subj].wrong++;
        }
      });

      // Merge with progress data for overall accuracy
      [...subjectSet].sort().forEach(subj => {
        const stats = subjectStats[subj] || { wrong: 0, mastered: 0, total: 0 };
        const progressData = progress && progress.subjects ? progress.subjects[subj] : null;

        let accuracy = 0;
        let totalAnswered = 0;
        let totalCorrect = 0;

        if (progressData) {
          totalAnswered = progressData.totalAnswered || 0;
          totalCorrect = progressData.totalCorrect || 0;
          accuracy = progressData.accuracy || 0;
        }

        // If we have wrong questions data, estimate accuracy
        if (stats.total > 0 && !progressData) {
          const recovered = stats.mastered;
          const stillWrong = stats.wrong;
          // Rough estimate: wrong questions are a subset of all answered
          accuracy = stats.total > 0 ? Math.round((recovered / stats.total) * 100) : 0;
        }

        const barColor = getMasteryColor(accuracy);

        html += `<div class="mastery-card">
          <div class="mastery-card-header">
            <span class="subject-name">${escapeHtml(getSubjectName(subj))}</span>
            <span class="mastery-pct" style="color:${barColor}">${accuracy}%</span>
          </div>
          <div class="mastery-bar-track">
            <div class="mastery-bar-fill" style="width:${accuracy}%;background:${barColor}"></div>
          </div>
          <div class="mastery-stats">
            <span>❌ ${stats.wrong} 未掌握</span>
            <span>✅ ${stats.mastered} 已掌握</span>
            ${totalAnswered > 0 ? `<span>📝 ${totalAnswered} 已答</span>` : ''}
          </div>
        </div>`;
      });

      grid.innerHTML = html;
    }

    function stripHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html || '';
      return div.textContent || '';
    }

    function renderKatex() {
      if (!window.katex) return;
      document.querySelectorAll('.math-inline, .q-text .katex, .q-option .katex').forEach(el => {
        // Already rendered by KaTeX auto-render
      });
      // Try auto-render
      if (window.renderMathInElement) {
        window.renderMathInElement(document.getElementById('question-list'), {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
            {left: '\\(', right: '\\)', display: false},
            {left: '\\[', right: '\\]', display: true}
          ]
        });
      }
    }

    // ========== Load KaTeX ==========
    function loadKatexLib() {
      return new Promise((resolve) => {
        if (window.katex) return resolve();
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js';
        script.onload = () => {
          // Load auto-render
          const ar = document.createElement('script');
          ar.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js';
          ar.onload = () => resolve();
          ar.onerror = () => resolve();
          document.head.appendChild(ar);
        };
        script.onerror = () => resolve();
        document.head.appendChild(script);
      });
    }

    // ========== UI Actions ==========
    window.toggleCard = function(safeId) {
      const body = document.getElementById('body-' + safeId);
      const icon = document.getElementById('icon-' + safeId);
      if (!body) return;
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      if (icon) icon.textContent = isOpen ? '▶' : '▼';

      // Render KaTeX when expanding
      if (!isOpen) {
        setTimeout(renderKatex, 50);
      }
    };

    window.toggleGroup = function(groupId) {
      const body = document.getElementById('body-' + groupId);
      const toggle = document.getElementById('toggle-' + groupId);
      if (!body) return;
      const isHidden = body.style.display === 'none';
      body.style.display = isHidden ? '' : 'none';
      if (toggle) {
        toggle.textContent = isHidden ? '▼ 收起' : '▶ 展开';
      }
    };

    window.setFilter = function(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('is-active'));
      if (btn) btn.classList.add('is-active');
      render();
    };

    window.applyFilters = function() {
      currentSubject = document.getElementById('subject-filter').value;
      render();
    };

    window.doMaster = function(questionId) {
      markMastered(questionId);
      render();
    };

    window.doUnmaster = function(questionId) {
      unmarkMastered(questionId);
      render();
    };

    window.doRemove = function(questionId) {
      removeWrongQuestion(questionId);
      unmarkMastered(questionId);
      // Also remove from flagged if present
      flaggedQuestions = flaggedQuestions.filter(q => q.question_id !== questionId);
      render();
    };

    // ========== Init ==========
    loadKatexLib().then(() => init());
  </script>
</body>
</html>
