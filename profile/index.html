<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile · AP Practice Website</title>
  <meta name="robots" content="noindex">
  <script src="../assets/site-base.js"></script>
  <script src="../assets/nav.js" defer></script>
  <script>document.head.insertAdjacentHTML('beforeend','<link rel="stylesheet" href="'+window.sitePath('/assets/site.css')+'" data-site-css>');</script>
  <script src="../assets/mock-state.js" defer></script>
  <script src="../assets/site-pages.js" defer></script>
</head>
<body data-page="profile">
  <header class="site-header">
    <div class="shell nav">
      <a class="brand" id="nav-brand">
        <span class="brand-mark">AP</span>
        <span class="brand-copy">
          <span class="brand-title">AP Practice Website</span>
          <span class="brand-subtitle">自用 AP 练习站</span>
        </span>
      </a>
      <nav class="nav-main" aria-label="Primary">
        <!-- 由 assets/nav.js 自动注入 -->
      </nav>
      <a class="avatar-entry is-active" id="nav-profile" aria-label="Open profile">
        <span class="avatar">OC</span>
        <span class="avatar-meta">
          <strong>Olivia Chen</strong>
          <span>Profile</span>
        </span>
      </a>
    </div>
  </header>
  <script>
    document.getElementById('nav-brand').href = window.sitePath('/');
    document.getElementById('nav-profile').href = window.sitePath('/profile/');
  </script>

  <main class="page-main shell">
    <section class="page-heading">
      <h1>Profile</h1>
      <p>个人信息、简介、目标与学习偏好都先集中放在这里。</p>
    </section>
    <section class="page-panel">
      <div id="profile-root" data-page-root>
        <div class="loading-state">正在加载个人信息...</div>
      </div>
    </section>
  </main>

  <footer class="shell footer">
    <p>Local AP practice workspace. Reference folders remain read-only.</p>
  </footer>
</body>
</html>
