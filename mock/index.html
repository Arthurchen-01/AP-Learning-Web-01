<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>套题模考 - AP Learning</title>
  <script>
    var m = location.pathname.match(/^\/(AP-Learning-Web-0\d)(?:\/|$)/);
    window._b = m ? '/' + m[1] : '';
  </script>
  <script src="../assets/site-base.js"></script>
  <link rel="stylesheet" href="../assets/global-theme.css">
  <style>
    body { overflow-x: hidden; }
  </style>
</head>
<body data-page="mock">
  <header class="site-header">
    <div class="shell nav">
      <a class="brand" id="nav-brand">
        <span class="brand-mark">AP</span>
        <span class="brand-copy">
          <span class="brand-title">AP Practice Website</span>
          <span class="brand-subtitle">自用 AP 练习站</span>
        </span>
      </a>
      <nav class="nav-main" aria-label="Primary">
        <a id="nav-home">首页</a>
        <a class="is-active" id="nav-mock">套题模考</a>
        <a id="nav-training">专项训练</a>
        <a id="nav-dashboard">Dashboard</a>
      </nav>
      <a class="avatar-entry" id="nav-profile" aria-label="Open profile">
        <span class="avatar">OC</span>
        <span class="avatar-meta">
          <strong>Olivia Chen</strong>
          <span>Profile</span>
        </span>
      </a>
    </div>
  </header>
  <script>
    document.getElementById('nav-brand').href = window.sitePath('/');
    document.getElementById('nav-home').href = window.sitePath('/');
    document.getElementById('nav-mock').href = window.sitePath('/mock/');
    document.getElementById('nav-training').href = window.sitePath('/training/');
    document.getElementById('nav-dashboard').href = window.sitePath('/dashboard/');
    document.getElementById('nav-profile').href = window.sitePath('/profile/');
  </script>

  <main class="page-main shell">
    <section class="page-heading">
      <h1>套题模考</h1>
      <p>选择试卷，开始计时练习</p>
    </section>

    <section class="page-panel">
      <div class="filters" style="padding: 18px 22px 0;">
        <select class="filter-select" id="subject-filter">
          <option value="">全部科目</option>
        </select>
        <select class="filter-select" id="year-filter">
          <option value="">全部年份</option>
        </select>
        <select class="filter-select" id="type-filter">
          <option value="">全部类型</option>
        </select>
      </div>
      <div class="exam-list dashboard-list" id="exam-list" style="padding: 16px 22px 22px;">
        <div class="loading-state">加载中...</div>
      </div>
    </section>
  </main>

  <footer class="shell footer">
    <p>Local AP practice workspace. Reference folders remain read-only.</p>
  </footer>

  <style>
    .filter-select {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-right: 8px;
      margin-bottom: 8px;
    }
    .exam-list { display: flex; flex-direction: column; gap: 12px; }
    .exam-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--card-bg);
      transition: all 0.2s;
    }
    .exam-card:hover { border-color: var(--accent); transform: translateX(4px); }
    .exam-info h3 { font-size: 1rem; margin-bottom: 6px; }
    .exam-meta { display: flex; flex-wrap: wrap; gap: 12px; color: var(--text-muted); font-size: 0.82rem; }
    .exam-meta span { display: flex; align-items: center; gap: 4px; }
    .btn {
      padding: 8px 18px;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      display: inline-block;
      font-size: 0.88rem;
    }
    .btn-primary { background: var(--accent-soft); color: var(--accent-strong); }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .progress-tag {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--success);
      color: white;
      font-weight: 700;
    }
    .progress-tag.not-started { background: var(--text-muted); }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
  </style>

  <script>
    let catalogData = null;

    const subjectMap = {
      '宏观经济': 'macroeconomics',
      '微积分BC': 'calculus_bc',
      '微积分AB': 'calculus_ab',
      '微观经济': 'microeconomics',
      '心理学': 'psychology',
      '物理C力学': 'physics_c_mechanics',
      '物理C电磁': 'physics_c_em',
      '统计学': 'statistics',
      '计算机科学A': 'csa'
    };

    const subjectIcons = {
      '宏观经济': '📊',
      '微积分BC': '∫',
      '微积分AB': '∫',
      '微观经济': '📈',
      '心理学': '🧠',
      '物理C力学': '⚡',
      '物理C电磁': '⚡',
      '统计学': '📉',
      '计算机科学A': '💻'
    };

    // Load catalog
    async function loadCatalog() {
      try {
        const resp = await fetch(window.sitePath('/mock-data/exam-catalog.json'));
        catalogData = await resp.json();
        populateFilters();
        renderExamList();
      } catch (e) {
        console.error('Failed to load catalog:', e);
        document.getElementById('exam-list').innerHTML = '<div class="empty-state">加载失败，请刷新重试</div>';
      }
    }

    function populateFilters() {
      if (!catalogData) return;

      const subjectFilter = document.getElementById('subject-filter');
      const yearFilter = document.getElementById('year-filter');
      const typeFilter = document.getElementById('type-filter');

      catalogData.subjects.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        subjectFilter.appendChild(opt);
      });

      catalogData.years.forEach(y => {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y + '年';
        yearFilter.appendChild(opt);
      });

      catalogData.paperTypes.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t;
        opt.textContent = t;
        typeFilter.appendChild(opt);
      });
    }

    function getProgress(examId) {
      try {
        const raw = localStorage.getItem('ap-learning-exam:' + examId);
        if (!raw) return null;
        const data = JSON.parse(raw);
        let answered = 0, total = 0;
        if (data.sections) {
          data.sections.forEach(s => {
            if (s.answers) {
              s.answers.forEach(a => { if (a !== null) answered++; total++; });
            }
          });
        }
        return { answered, total };
      } catch (e) { return null; }
    }

    function renderExamList() {
      if (!catalogData) return;

      const list = document.getElementById('exam-list');
      const subjectFilter = document.getElementById('subject-filter').value;
      const yearFilter = document.getElementById('year-filter').value;
      const typeFilter = document.getElementById('type-filter').value;

      let items = catalogData.items;

      if (subjectFilter) items = items.filter(i => i.subject === subjectFilter);
      if (yearFilter) items = items.filter(i => i.year === yearFilter);
      if (typeFilter) items = items.filter(i => i.paperType === typeFilter);

      if (items.length === 0) {
        list.innerHTML = '<div class="empty-state">没有找到匹配的试卷</div>';
        return;
      }

      list.innerHTML = items.map(exam => {
        const progress = getProgress(exam.examId);
        const examPath = window.sitePath('/v2/exam/paper.html?exam=' + exam.examId);
        const icon = subjectIcons[exam.subject] || '📚';

        return `
          <div class="exam-card">
            <div class="exam-info">
              <h3>${icon} ${exam.title}</h3>
              <div class="exam-meta">
                <span>📚 ${exam.subject}</span>
                <span>📅 ${exam.year}年</span>
                <span>📝 ${exam.questionCount}题</span>
                <span>📋 ${exam.paperType}</span>
                ${progress ? `<span class="progress-tag">${progress.answered}/${progress.total}</span>` : '<span class="progress-tag not-started">未开始</span>'}
              </div>
            </div>
            <a href="${examPath}" class="btn btn-primary">
              ${progress && progress.answered > 0 ? '继续' : '开始'}
            </a>
          </div>
        `;
      }).join('');
    }

    // Filters
    document.getElementById('subject-filter').addEventListener('change', renderExamList);
    document.getElementById('year-filter').addEventListener('change', renderExamList);
    document.getElementById('type-filter').addEventListener('change', renderExamList);

    loadCatalog();
  </script>
</body>
</html>
