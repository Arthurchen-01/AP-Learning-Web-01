<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>套题模考 - AP Learning</title>
  <script>
    var m = location.pathname.match(/^\/(AP-Learning-Web-0\d)(?:\/|$)/);
    window._b = m ? '/' + m[1] : '';
  </script>
  <script>document.write('<scr'+'ipt src="'+window._b+'/assets/site-base.js"><\/scr'+'ipt>');</script>
  <link rel="stylesheet" href="../../assets/global-theme.css">
  <style>
    body { overflow-x: hidden; }
  </style>
</head>
<body data-page="v2-exam">
  <header class="site-header">
    <div class="shell nav">
      <a class="brand" id="nav-brand">
        <span class="brand-mark">AP</span>
        <span class="brand-copy">
          <span class="brand-title">AP Practice Website</span>
          <span class="brand-subtitle">自用 AP 练习站</span>
        </span>
      </a>
      <nav class="nav-main" aria-label="Primary">
        <a id="nav-home">首页</a>
        <a class="is-active" id="nav-mock">套题模考</a>
        <a id="nav-training">专项训练</a>
        <a id="nav-wrong">错题本</a>
        <a id="nav-dashboard">Dashboard</a>
      </nav>
      <a class="avatar-entry" id="nav-profile" aria-label="Open profile">
        <span class="avatar">OC</span>
        <span class="avatar-meta">
          <strong>Olivia Chen</strong>
          <span>Profile</span>
        </span>
      </a>
      <button id="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle dark mode" style="background:rgba(30,41,59,0.92);border:1px solid rgba(51,65,85,0.5);border-radius:999px;padding:10px 14px;cursor:pointer;font-size:1.1rem;box-shadow:var(--shadow-soft);">☀️</button>
    </div>
  </header>
  <script>
    document.getElementById('nav-brand').href = window.sitePath('/');
    document.getElementById('nav-home').href = window.sitePath('/');
    document.getElementById('nav-mock').href = window.sitePath('/mock/');
    document.getElementById('nav-training').href = window.sitePath('/training/');
    document.getElementById('nav-wrong').href = window.sitePath('/v2/exam/wrong-notebook.html');
    document.getElementById('nav-dashboard').href = window.sitePath('/dashboard/');
    document.getElementById('nav-profile').href = window.sitePath('/profile/');
  </script>

  <main class="page-main shell">
    <section class="page-heading">
      <h1>套题模考</h1>
      <p>选择试卷，开始计时练习</p>
    </section>

    <section class="page-panel">
      <div class="filters" style="padding:18px 22px 0;display:flex;flex-wrap:wrap;gap:10px;align-items:center;">
        <select class="filter-select" id="subject-filter">
          <option value="">全部科目</option>
          <option value="calculus_bc">AP Calculus BC</option>
          <option value="calculus_ab">AP Calculus AB</option>
          <option value="statistics">AP Statistics</option>
          <option value="microeconomics">AP Microeconomics</option>
        </select>
        <select class="filter-select" id="year-filter">
          <option value="">全部年份</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="2022">2022</option>
          <option value="2021">2021</option>
          <option value="2020">2020</option>
          <option value="2019">2019</option>
          <option value="2018">2018</option>
        </select>
      </div>
      <div class="exam-list dashboard-list" id="exam-list" style="padding:16px 22px 22px;">
      </div>
    </section>
  </main>

  <footer class="shell footer">
    <p>Local AP practice workspace. Reference folders remain read-only.</p>
  </footer>

  <style>
    .filter-select {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--card-bg);
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    .exam-list { display: flex; flex-direction: column; gap: 12px; }
    .exam-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--card-bg);
      transition: all 0.2s;
    }
    .exam-card:hover { border-color: var(--accent); transform: translateX(4px); }
    .exam-info h3 { font-size: 1rem; margin-bottom: 6px; }
    .exam-meta { display: flex; flex-wrap: wrap; gap: 12px; color: var(--text-muted); font-size: 0.82rem; }
    .exam-meta span { display: flex; align-items: center; gap: 4px; }
    .btn {
      padding: 8px 18px;
      border-radius: 999px;
      font-weight: 800;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
      font-size: 0.88rem;
    }
    .btn-primary { background: var(--accent-soft); color: var(--accent-strong); }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .progress-tag {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--success);
      color: white;
      font-weight: 700;
    }
    .progress-tag.not-started { background: var(--text-muted); }
  </style>

  <script type="module">
    import { loadExamIndex, loadSession } from '../js/data-service.js';
    import { loadWrongQuestions } from '../js/exam-engine.js';

    const subjectNames = {
      'calculus_bc': '微积分BC',
      'calculus_ab': '微积分AB',
      'statistics': '统计学',
      'microeconomics': '微观经济',
      'macroeconomics': '宏观经济'
    };

    async function renderExamList() {
      const exams = await loadExamIndex();
      const list = document.getElementById('exam-list');
      const wrongQuestions = loadWrongQuestions();
      const wqCount = wrongQuestions.length;

      let html = '';

      // 错题本入口
      html += `
        <div class="exam-card" style="border-color: var(--danger); background: linear-gradient(135deg, rgba(239,68,68,0.08), rgba(239,68,68,0.03));">
          <div class="exam-info">
            <h3 style="color: var(--danger);">📝 错题本</h3>
            <div class="exam-meta">
              <span>已收录 <strong>${wqCount}</strong> 道错题</span>
            </div>
          </div>
          <div style="display: flex; gap: 8px; align-items: center;">
            <a href="wrong-notebook.html" class="btn btn-primary" style="background: var(--danger); color: #fff;">
              ${wqCount > 0 ? '复习错题' : '查看'}
            </a>
          </div>
        </div>
      `;

      if (!exams || exams.length === 0) {
        list.innerHTML = html + '<p style="color: var(--text-muted); text-align: center; padding: 2rem;">暂无试卷</p>';
        return;
      }

      html += exams.map(exam => {
        const session = loadSession(exam.exam_id);
        const progress = session ? getProgress(session) : null;
        const examPath = window.sitePath('/v2/exam/paper.html?exam=' + exam.exam_id);

        return `
          <div class="exam-card" data-subject="${exam.subject}" data-year="${exam.year}">
            <div class="exam-info">
              <h3>${exam.exam_title}</h3>
              <div class="exam-meta">
                <span>📚 ${subjectNames[exam.subject] || exam.subject}</span>
                <span>📝 ${exam.total_questions}题</span>
                <span>⏱️ ${getTotalTime(exam)}</span>
                ${progress ? `<span class="progress-tag">${progress.answered}/${progress.total}</span>` : '<span class="progress-tag not-started">未开始</span>'}
              </div>
            </div>
            <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
              ${exam.sections.map(s =>
                `<span class="chip ${s.calculator_allowed ? 'badge-calc' : 'badge-mcq'}" style="font-size:0.75rem;">${s.part_label}</span>`
              ).join('')}
              <a href="${examPath}" class="btn btn-primary">
                ${progress && progress.answered > 0 ? '继续' : '开始'}
              </a>
            </div>
          </div>
        `;
      }).join('');

      list.innerHTML = html;
    }

    function getTotalTime(exam) {
      const totalMins = exam.sections.reduce((sum, s) => sum + (s.time_limit_minutes || 60), 0);
      const hours = Math.floor(totalMins / 60);
      const mins = totalMins % 60;
      return hours > 0 ? `${hours}小时${mins > 0 ? mins + '分钟' : ''}` : `${mins}分钟`;
    }

    function getProgress(session) {
      if (!session || !session.sections) return null;
      let answered = 0, total = 0;
      session.sections.forEach(s => {
        s.answers.forEach(a => {
          if (a !== null) answered++;
          total++;
        });
      });
      return { answered, total };
    }

    document.getElementById('subject-filter').addEventListener('change', filterExams);
    document.getElementById('year-filter').addEventListener('change', filterExams);

    function filterExams() {
      const subject = document.getElementById('subject-filter').value;
      const year = document.getElementById('year-filter').value;
      document.querySelectorAll('.exam-card').forEach(card => {
        const matchSubject = !subject || card.dataset.subject === subject;
        const matchYear = !year || card.dataset.year === year;
        card.style.display = matchSubject && matchYear ? 'flex' : 'none';
      });
    }

    renderExamList();
  </script>
</body>
</html>
