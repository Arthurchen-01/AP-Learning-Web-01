<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>做题 - AP Learning</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script>
    var m = location.pathname.match(/^\/(AP-Learning-Web-0\d)(?:\/|$)/);
    window._b = m ? '/' + m[1] : '';
    window.sitePath = function(p) {
      if (/^(?:[a-z]+:)?\/\//i.test(p)) return p;
      var n = p.startsWith('/') ? p : '/' + p;
      return window._b + n;
    };
  </script>
  <script>document.write('<scr'+'ipt src="'+window._b+'/assets/site-base.js"><\/scr'+'ipt>');</script>
  <link rel="stylesheet" href="../../assets/global-theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Top Bar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1.5rem;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left { display: flex; align-items: center; gap: 1rem; }
    .topbar-center { display: flex; align-items: center; gap: 0.5rem; }
    .topbar-right { display: flex; align-items: center; gap: 0.75rem; }

    .section-label {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .section-label strong { color: var(--text); }

    .timer {
      font-size: 1.25rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      padding: 0.25rem 0.75rem;
      background: var(--bg);
      border-radius: 6px;
    }
    .timer.warning { color: var(--warning); }
    .timer.danger { color: var(--danger); }

    .btn {
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      transition: all 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .btn-flagged { background: var(--warning); border-color: var(--warning); color: white; }

    /* Main Layout */
    .exam-layout {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1rem;
      max-width: 1400px;
      margin: 1.5rem auto;
      padding: 0 1.5rem;
    }

    /* Question Panel */
    .question-panel {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 1.5rem;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .question-number {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .question-unit { font-size: 0.85rem; color: var(--text-muted); }

    .question-text {
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .question-text .math-inline {
      font-size: 1.1em;
    }

    .options-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .option-row {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 1rem;
      background: var(--bg);
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .option-row:hover { border-color: var(--primary); }
    .option-row.selected { border-color: var(--primary); background: #3b82f615; }

    .option-key {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--border);
      border-radius: 50%;
      font-weight: 700;
      flex-shrink: 0;
    }
    .option-row.selected .option-key { background: var(--primary); }

    .option-content {
      flex: 1;
      line-height: 1.5;
      padding-top: 0.25rem;
    }

    /* Immediate Feedback */
    .option-row.correct {
      border-color: var(--success) !important;
      background: #22c55e18 !important;
      animation: correctPulse 0.5s ease;
    }
    .option-row.correct .option-key { background: var(--success) !important; }
    .option-row.incorrect {
      border-color: var(--danger) !important;
      background: #ef444418 !important;
      animation: shake 0.4s ease;
    }
    .option-row.incorrect .option-key { background: var(--danger) !important; }
    .option-row.correct-answer {
      border-color: var(--success) !important;
      background: #22c55e18 !important;
    }
    .option-row.correct-answer .option-key { background: var(--success) !important; }
    @keyframes correctPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.01); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* Feedback Banner */
    .feedback-banner {
      margin-top: 1rem;
      padding: 0.875rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      animation: fadeIn 0.3s ease;
    }
    .feedback-banner.correct { background: #22c55e15; border: 1px solid var(--success); color: var(--success); }
    .feedback-banner.incorrect { background: #ef444415; border: 1px solid var(--danger); color: var(--danger); }
    .feedback-banner .fb-icon { font-size: 1.1rem; flex-shrink: 0; }
    .feedback-banner .fb-text { line-height: 1.5; }
    .feedback-banner .fb-explanation { margin-top: 0.5rem; color: var(--text-muted); font-size: 0.9rem; border-top: 1px solid #334155; padding-top: 0.5rem; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    /* FRQ Scoring Points Self-Assessment */
    .frq-scoring-points {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .sp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: #1e293b;
      border-bottom: 1px solid var(--border);
    }
    .sp-title { font-size: 0.9rem; font-weight: 600; color: var(--text); }
    .sp-progress { font-size: 0.8rem; color: var(--primary); background: #3b82f620; padding: 0.2rem 0.6rem; border-radius: 12px; }
    .sp-row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.88rem;
      line-height: 1.4;
    }
    .sp-row:last-child { border-bottom: none; }
    .sp-row:hover { background: #ffffff08; }
    .sp-row.checked { background: #22c55e08; }
    .sp-row.checked .sp-sign { color: var(--success); }
    .sp-row input[type=checkbox] { margin-top: 2px; accent-color: var(--success); width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; }
    .sp-sign { font-weight: 600; color: var(--text-muted); min-width: 28px; }
    .sp-content { color: var(--text); flex: 1; }

    /* Question Footer */
    .question-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .question-notes {
      width: 100%;
      margin-top: 0.75rem;
    }
    .question-notes label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
      font-weight: 600;
    }
    .question-notes textarea {
      width: 100%;
      min-height: 64px;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .question-notes textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .progress-info {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Navigator Sidebar */
    .navigator {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 1rem;
      height: fit-content;
      position: sticky;
      top: 70px;
    }

    .nav-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .nav-title { font-weight: 600; font-size: 0.95rem; }

    .nav-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.4rem;
    }

    .nav-chip {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-chip:hover { border-color: var(--primary); }
    .nav-chip.answered { background: var(--primary); border-color: var(--primary); color: white; }
    .nav-chip.flagged { background: var(--warning); border-color: var(--warning); color: white; }
    .nav-chip.current { border: 2px solid var(--primary); }

    .nav-section-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin: 0.75rem 0 0.5rem;
      text-transform: uppercase;
    }

    /* Results */
    .results-panel {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
    }
    .results-score {
      font-size: 4rem;
      font-weight: 700;
      color: var(--primary);
    }
    .results-label { color: var(--text-muted); margin-bottom: 1.5rem; }
    .results-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .result-item { padding: 1rem; background: var(--bg); border-radius: 8px; }
    .result-item .value { font-size: 1.5rem; font-weight: 700; }
    .result-item .label { font-size: 0.8rem; color: var(--text-muted); }

    /* ── Option row states ── */
    .option-row { position: relative; }
    .option-row.selected {
      border-color: var(--primary) !important;
      background: rgba(59,130,246,0.12);
    }
    .option-row.selected .option-key { background: var(--primary); }

    /* ── Exclude (cross-out) ── */
    .option-row.is-excluded { opacity: 0.42; }
    .option-row.is-excluded .option-content { text-decoration: line-through; }
    .opt-exclude-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      color: var(--text-muted);
      font-size: 14px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .option-row:hover .opt-exclude-btn { display: flex; }
    .opt-exclude-btn:hover { border-color: var(--danger); color: var(--danger); background: rgba(239,68,68,0.1); }
    .opt-exclude-btn.is-active {
      display: flex;
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(239,68,68,0.15);
    }

    /* ── FRQ image upload ── */
    .frq-upload-zone {
      margin-top: 1.5rem;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .frq-upload-zone:hover { border-color: var(--primary); background: rgba(59,130,246,0.05); }
    .frq-upload-zone.has-image { border-style: solid; border-color: var(--success); background: rgba(34,197,94,0.05); cursor: default; }
    .frq-upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .frq-upload-text { font-size: 0.9rem; color: var(--text-muted); }
    .frq-upload-text strong { color: var(--primary); }
    .frq-preview { max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 0.75rem; }
    .frq-upload-actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; justify-content: center; }

    /* ── Confirm Modal ── */
    .confirm-modal {
      display: none;
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center;
    }
    .confirm-modal.show { display: flex; }
    .confirm-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem;
      max-width: 420px; width: 90%;
      display: grid; gap: 1rem;
    }
    .confirm-card h3 { font-size: 1.1rem; margin: 0; }
    .confirm-card p { font-size: 0.88rem; color: var(--text-muted); line-height: 1.6; margin: 0; }
    .confirm-btns { display: flex; gap: 0.75rem; justify-content: flex-end; }
    .btn-cancel { background: var(--card-bg); border: 1px solid var(--border); color: var(--text); }
    .btn-confirm-danger { background: var(--danger); border: 1px solid var(--danger); color: #fff; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      color: var(--text-muted);
    }
    .loading::after {
      content: '';
      width: 24px;
      height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Text Highlighting ── */
    .user-highlight {
      background: #fef08a;
      border-radius: 2px;
      padding: 0 2px;
      cursor: pointer;
    }
    .user-highlight:hover {
      background: #fde047;
    }
    .btn-highlight.active {
      background: #eab308 !important;
      border-color: #eab308 !important;
      color: #1a1a1a !important;
    }
    .highlight-mode .question-text,
    .highlight-mode .option-content {
      cursor: text;
      user-select: text;
    }

    /* ── Option Selection Checkmark Animation ── */
    .option-key-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      transition: all 0.15s;
    }
    .option-row.selected .option-key-inner .option-letter {
      display: none;
    }
    .option-row.selected .option-key-inner .option-check {
      display: inline;
      animation: popIn 0.2s ease;
    }
    .option-check {
      display: none;
      font-size: 1rem;
    }
    .option-letter {
      display: inline;
    }
    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* ── Review Summary ── */
    .review-summary {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 2rem;
      animation: fadeIn 0.3s ease;
    }
    .review-summary h2 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
    }
    .review-meta {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
    }
    .review-stats {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .review-stat {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.9rem;
    }
    .review-stat .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.answered { background: var(--primary); }
    .dot.flagged { background: var(--warning); }
    .dot.empty { background: var(--border); }
    .review-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 0.6rem;
      margin-bottom: 2rem;
    }
    .review-chip {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.9rem;
      font-weight: 600;
      position: relative;
      gap: 2px;
    }
    .review-chip:hover { border-color: var(--primary); }
    .review-chip.answered { background: var(--primary); border-color: var(--primary); color: white; }
    .review-chip.flagged:not(.answered) { border-color: var(--warning); }
    .review-chip .chip-icon {
      font-size: 0.6rem;
      position: absolute;
      top: 3px;
      right: 5px;
    }
    .review-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }
    .btn-submit-section {
      background: var(--success);
      border-color: var(--success);
      color: white;
      padding: 0.6rem 1.5rem;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <span class="section-label" id="section-label">Loading...</span>
    </div>
    <div class="topbar-center">
      <div class="timer" id="timer">--:--</div>
    </div>
    <div class="topbar-right">
      <button id="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle theme" style="background:var(--border);border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:1rem;">🌙</button>
      <button class="btn btn-highlight" id="btn-highlight" title="高亮标记文字">🖍 Highlight</button>
      <button class="btn" id="btn-flag" title="标记此题">🚩 Flag</button>
      <button class="btn" id="btn-navigator" title="题目导航">☰ Navigator</button>
      <button class="btn" id="btn-submit" style="background: var(--success); border-color: var(--success);">Submit</button>
    </div>
  </div>

  <div class="exam-layout" id="exam-layout">
    <div class="loading">加载试卷中</div>
  </div>

  <!-- Confirm Modal -->
  <div class="confirm-modal" id="confirm-modal">
    <div class="confirm-card">
      <h3 id="confirm-title">Are you absolutely sure?</h3>
      <p id="confirm-body">You can start over from here. Your answer records for this exam will be lost after this operation. Are you sure?</p>
      <div class="confirm-btns">
        <button class="btn btn-cancel" id="confirm-cancel">Cancel</button>
        <button class="btn btn-confirm-danger" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Navigator Modal -->
  <div id="navigator-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center;">
    <div class="navigator" style="position: static; max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto;">
      <div class="nav-header">
        <span class="nav-title">题目导航</span>
        <button class="btn" onclick="document.getElementById('navigator-modal').style.display='none'">✕</button>
      </div>
      <div id="nav-chips"></div>
    </div>
  </div>

  <script type="module">
    import { loadExam, loadExamQuestions } from '../js/data-service.js';
    import { createFreshState, loadState, saveState, formatTime, ExamTimer, clearState, calculateResults, saveWrongQuestion, updateUserProgress } from '../js/exam-engine.js';

    // 解析 URL 参数
    const params = new URLSearchParams(window.location.search);
    const examId = params.get('exam') || 'calc-bc-2018-intl';

    let exam = null;
    let questions = null;
    let state = null;
    let timer = null;
    let currentSectionIndex = 0;
    let highlightMode = false;
    let showingReview = false;

    // 初始化
    async function init() {
      exam = await loadExam(examId);
      questions = await loadExamQuestions(examId);

      if (!exam || !questions) {
        document.getElementById('exam-layout').innerHTML = '<p style="color: var(--danger); text-align: center; padding: 2rem;">加载失败：请检查试卷数据</p>';
        return;
      }

      // 加载或创建状态
      state = loadState(examId);
      if (!state) {
        state = createFreshState(exam);
        // Initialize highlights for fresh state
        state.sections.forEach(section => {
          if (!section.highlights) section.highlights = new Array(section.answers.length).fill(null).map(() => []);
        });
      } else {
        // 迁移旧状态：补充 excluded、frqImages、selfAssessment 字段
        state.sections.forEach(section => {
          if (!section.excluded) section.excluded = new Array(section.answers.length).fill(false);
          if (!section.frqImages) section.frqImages = null;
          if (!section.selfAssessment) section.selfAssessment = new Array(section.answers.length).fill(null);
          if (!section.highlights) section.highlights = new Array(section.answers.length).fill(null).map(() => []);
        });
      }
      // 将 questions 附加到 exam（无论新创建还是加载的 state）
      exam.sections.forEach((section, sIdx) => {
        section.questions = questions.filter(q => q.section_id === section.section_id);
      });

      saveState(examId, state);

      // 启动计时器
      timer = new ExamTimer(
        (remaining) => updateTimerDisplay(remaining),
        () => submitSection()
      );

      const currentSection = state.sections[currentSectionIndex];
      if (currentSection) {
        timer.start(currentSection.timeRemainingSec);
      }

      // 渲染界面
      renderQuestion();
      renderNavigator();

      // 事件绑定
      document.getElementById('btn-highlight').addEventListener('click', toggleHighlightMode);
      document.getElementById('btn-flag').addEventListener('click', toggleFlag);
      document.getElementById('btn-navigator').addEventListener('click', () => {
        document.getElementById('navigator-modal').style.display = 'flex';
      });
      document.getElementById('btn-submit').addEventListener('click', () => {
        showConfirm(
          '确认提交',
          '确定要提交当前部分的答案吗？提交后将进入下一部分。',
          () => submitSection()
        );
      });

      document.getElementById('navigator-modal').addEventListener('click', (e) => {
        if (e.target.id === 'navigator-modal') {
          e.target.style.display = 'none';
        }
      });
    }

    // 判断是否 FRQ
    function isFRQ(question) {
      const t = question.question_type || '';
      return t === 'frq' || t === 'free_response' || t === 'essay';
    }

    // 渲染当前题目
    function renderQuestion() {
      const section = state.sections[currentSectionIndex];
      if (!section) return;

      const qIndex = state.questionIndex;
      const question = exam.sections[currentSectionIndex].questions[qIndex];
      if (!question) return;

      const answered = section.answers[qIndex] !== null;
      const flagged = section.flagged[qIndex];
      const frq = isFRQ(question);
      const excludedKeys = section.excluded[qIndex] || [];

      document.getElementById('section-label').innerHTML = `
        <strong>${exam.exam_title}</strong> · ${exam.sections[currentSectionIndex].part_label}
      `;

      document.getElementById('btn-flag').className = flagged ? 'btn btn-flagged' : 'btn';

      // 渲染选项或 FRQ 响应区
      let responseHTML = '';
      if (frq) {
        const frqImages = section.frqImages ?? '';
        const selfAssess = section.selfAssessment?.[qIndex] ?? [];
        const parts = question.subjectiveList || [];
        responseHTML = `
          <div style="margin-top:1.5rem">
            ${parts.length > 0 ? `
            <div class="frq-scoring-points">
              <div class="sp-header">
                <span class="sp-title">📋 得分点自检</span>
                <span class="sp-progress">${selfAssess.filter(Boolean).length}/${parts.length}</span>
              </div>
              ${parts.map((part, pi) => `
                <label class="sp-row ${selfAssess[pi] ? 'checked' : ''}">
                  <input type="checkbox" data-partidx="${pi}" ${selfAssess[pi] ? 'checked' : ''}>
                  <span class="sp-sign">(${part.partSign})</span>
                  <span class="sp-content">${part.partContent.replace(/<[^>]+>/g, '').slice(0, 80)}${part.partContent.replace(/<[^>]+>/g, '').length > 80 ? '...' : ''}</span>
                </label>
              `).join('')}
            </div>` : ''}
            <div class="frq-upload-zone ${frqImages ? 'has-image' : ''}" id="frq-upload-zone">
              ${frqImages
                ? `<img src="${frqImages}" class="frq-preview" id="frq-preview-img"/>
                   <div class="frq-upload-actions">
                     <button class="btn" id="frq-reupload">重新上传</button>
                     <button class="btn" id="frq-clear" style="color:var(--danger);border-color:var(--danger)">删除</button>
                   </div>`
                : `<div class="frq-upload-icon">📷</div>
                   <div class="frq-upload-text"><strong>点击上传图片</strong><br>支持手写步骤截图</div>
                   <input type="file" accept="image/*" id="frq-file-input" style="display:none">`
              }
            </div>
          </div>`;
      } else {
        responseHTML = `
          <div class="options-list">
            ${question.options.map(opt => {
              const isSelected = section.answers[qIndex] === opt.key;
              const isExcluded = excludedKeys.includes(opt.key);
              return `
                <div class="option-row ${isSelected ? 'selected' : ''} ${isExcluded ? 'is-excluded' : ''}" data-key="${opt.key}">
                  <div class="option-key"><span class="option-key-inner"><span class="option-letter">${opt.key}</span><span class="option-check">✓</span></span></div>
                  <div class="option-content">${opt.html}</div>
                  <button class="opt-exclude-btn ${isExcluded ? 'is-active' : ''}" title="排除此选项" data-action="exclude" data-key="${opt.key}">✕</button>
                </div>`;
            }).join('')}
          </div>`;
      }

      const layout = document.getElementById('exam-layout');
      layout.innerHTML = `
        <div class="question-panel">
          <div class="question-header">
            <span class="question-number">第 ${qIndex + 1} 题</span>
            ${question.unit ? `<span class="question-unit">${question.unit}</span>` : ''}
            ${frq ? '<span class="question-unit" style="color:var(--warning)">📝 FRQ</span>' : ''}
          </div>

          <div class="question-text" id="question-text">${question.question_html || question.question_text || ''}</div>

          ${responseHTML}

          <div class="question-footer">
            <span class="progress-info">
              ${currentSectionIndex + 1}/${exam.sections.length} 部分 ·
              第 ${qIndex + 1}/${exam.sections[currentSectionIndex].questions.length} 题
              ${answered ? ' · 已作答' : ''}
            </span>
            <div style="display: flex; gap: 0.5rem;">
              <button class="btn" id="btn-prev" ${qIndex === 0 && currentSectionIndex === 0 ? 'disabled' : ''}>← 上一题</button>
              <button class="btn" id="btn-next">${qIndex === exam.sections[currentSectionIndex].questions.length - 1 ? '下一部分 →' : '下一题 →'}</button>
            </div>
          </div>

          <div class="question-notes">
            <label for="question-notes-input">📝 笔记</label>
            <textarea id="question-notes-input" placeholder="添加笔记...">${section.notes[qIndex] || ''}</textarea>
          </div>
        </div>

        <div class="navigator">
          <div class="nav-header">
            <span class="nav-title">答题进度</span>
            <span style="font-size: 0.8rem; color: var(--text-muted)">${getAnsweredCount()}/${getTotalCount()} 已答</span>
          </div>
          <div class="nav-grid" id="sidebar-nav"></div>
        </div>
      `;

      // 渲染数学公式
      if (window.katex) {
        document.querySelectorAll('.question-text, .option-content').forEach(el => {
          el.innerHTML = el.innerHTML.replace(/\$([^$]+)\$/g, (_, latex) => {
            try {
              return window.katex.renderToString(latex, { throwOnError: false, displayMode: false });
            } catch(e) { return '$' + latex + '$'; }
          });
        });
      }

      // Re-apply saved highlights
      reapplyHighlights();

      // Highlight mode: capture text selection
      if (highlightMode) {
        document.body.classList.add('highlight-mode');
        const qPanel = document.querySelector('.question-panel');
        if (qPanel) {
          qPanel.addEventListener('mouseup', handleHighlightSelection);
        }
      } else {
        document.body.classList.remove('highlight-mode');
      }

      if (frq) {
        // FRQ 图片上传
        const zone = document.getElementById('frq-upload-zone');
        const fileInput = document.getElementById('frq-file-input');
        const uploadFile = (file) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const dataUrl = e.target.result;
            zone.innerHTML = `<img src="${dataUrl}" class="frq-preview" id="frq-preview-img"/>
              <div class="frq-upload-actions">
                <button class="btn" id="frq-reupload">重新上传</button>
                <button class="btn" id="frq-clear" style="color:var(--danger);border-color:var(--danger)">删除</button>
              </div>`;
            zone.classList.add('has-image');
            section.frqImages = dataUrl;
            saveState(examId, state);
            attachFRQListeners();
          };
          reader.readAsDataURL(file);
        };
        if (zone) {
          if (!frqImages) {
            zone.addEventListener('click', () => fileInput && fileInput.click());
            fileInput && fileInput.addEventListener('change', () => {
              const file = fileInput.files[0];
              if (file) uploadFile(file);
            });
          }
          attachFRQListeners();
        }
        function attachFRQListeners() {
          document.getElementById('frq-reupload') && document.getElementById('frq-reupload').addEventListener('click', (e) => {
            e.stopPropagation();
            const fi = document.createElement('input'); fi.type = 'file'; fi.accept = 'image/*'; fi.style.display = 'none';
            fi.addEventListener('change', () => {
              const file = fi.files[0]; if (file) uploadFile(file);
            });
            document.body.appendChild(fi); fi.click(); fi.remove();
          });
          document.getElementById('frq-clear') && document.getElementById('frq-clear').addEventListener('click', (e) => {
            e.stopPropagation();
            section.frqImages = null;
            saveState(examId, state);
            renderQuestion();
          });
        }
        // 得分点自检 Checkbox 事件
        document.querySelectorAll('.sp-row input[type=checkbox]').forEach(cb => {
          cb.addEventListener('change', () => {
            const pi = parseInt(cb.dataset.partidx);
            if (!section.selfAssessment) section.selfAssessment = {};
            if (!section.selfAssessment[qIndex]) section.selfAssessment[qIndex] = [];
            section.selfAssessment[qIndex][pi] = cb.checked;
            saveState(examId, state);
            cb.closest('.sp-row').classList.toggle('checked', cb.checked);
            const checked = section.selfAssessment[qIndex].filter(Boolean).length;
            const total = (exam.sections[currentSectionIndex].questions[qIndex]?.subjectiveList || []).length;
            const prog = document.querySelector('.sp-progress');
            if (prog) prog.textContent = `${checked}/${total}`;
          });
        });
      } else {
        // MCQ 选项点击
        document.querySelectorAll('.option-row').forEach(row => {
          row.addEventListener('click', (e) => {
            // 排除按钮不触发选中
            if (e.target.dataset.action === 'exclude') return;
            if (row.classList.contains('is-excluded')) return;
            selectOption(row.dataset.key);
          });
        });
        // 排除按钮
        document.querySelectorAll('.opt-exclude-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            e.stopPropagation();
            excludeOption(btn.dataset.key);
          });
        });
      }

      // 导航按钮
      document.getElementById('btn-prev').addEventListener('click', prevQuestion);
      document.getElementById('btn-next').addEventListener('click', nextQuestion);

      // 笔记自动保存
      let notesTimeout = null;
      document.getElementById('question-notes-input').addEventListener('input', (e) => {
        section.notes[qIndex] = e.target.value;
        clearTimeout(notesTimeout);
        notesTimeout = setTimeout(() => {
          saveState(examId, state);
        }, 500);
      });

      renderSidebarNav();
    }

    // 渲染侧边栏导航
    function renderSidebarNav() {
      const section = exam.sections[currentSectionIndex];
      const nav = document.getElementById('sidebar-nav');

      nav.innerHTML = `
        <div class="nav-section-title">${section.part_label}</div>
        ${section.questions.map((q, i) => `
          <div class="nav-chip ${state.sections[currentSectionIndex].answers[i] !== null ? 'answered' : ''}
                               ${state.sections[currentSectionIndex].flagged[i] ? 'flagged' : ''}
                               ${i === state.questionIndex ? 'current' : ''}"
               data-section="${currentSectionIndex}" data-index="${i}">${i + 1}</div>
        `).join('')}
      `;

      nav.querySelectorAll('.nav-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          currentSectionIndex = parseInt(chip.dataset.section);
          state.questionIndex = parseInt(chip.dataset.index);
          renderQuestion();
          document.getElementById('navigator-modal').style.display = 'none';
        });
      });
    }

    // 渲染导航弹窗
    function renderNavigator() {
      const container = document.getElementById('nav-chips');
      container.innerHTML = exam.sections.map((section, sIdx) => `
        <div class="nav-section-title">${section.part_label} (${section.questions.length}题)</div>
        <div class="nav-grid">
          ${section.questions.map((q, i) => `
            <div class="nav-chip ${state.sections[sIdx].answers[i] !== null ? 'answered' : ''}
                                 ${state.sections[sIdx].flagged[i] ? 'flagged' : ''}
                                 ${sIdx === currentSectionIndex && i === state.questionIndex ? 'current' : ''}"
                 data-section="${sIdx}" data-index="${i}">${i + 1}</div>
          `).join('')}
        </div>
      `).join('');

      container.querySelectorAll('.nav-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          currentSectionIndex = parseInt(chip.dataset.section);
          state.questionIndex = parseInt(chip.dataset.index);
          renderQuestion();
          document.getElementById('navigator-modal').style.display = 'none';
        });
      });
    }

    // 选择选项（跳过已排除的选项）— 带即时反馈
    function selectOption(key) {
      const section = state.sections[currentSectionIndex];
      if (section.excluded[state.questionIndex] && section.excluded[state.questionIndex].includes(key)) return;

      const currentQ = exam.sections[currentSectionIndex].questions[state.questionIndex];
      const correctKey = currentQ.correct_answer;
      const isCorrect = key === correctKey;

      section.answers[state.questionIndex] = key;
      saveState(examId, state);

      document.querySelectorAll('.option-row').forEach(row => {
        const k = row.dataset.key;
        const isSelected = k === key;
        row.classList.remove('selected', 'correct', 'incorrect', 'correct-answer');
        if (isSelected) {
          row.classList.add(isCorrect ? 'correct' : 'incorrect');
        } else if (k === correctKey) {
          row.classList.add('correct-answer');
        }
        if (isSelected) row.classList.remove('is-excluded');
      });

      // 显示反馈Banner
      showFeedbackBanner(isCorrect, correctKey, currentQ.explanation || '');

      // 更新nav chip
      document.querySelectorAll('.nav-chip').forEach(chip => {
        if (parseInt(chip.dataset.section) === currentSectionIndex &&
            parseInt(chip.dataset.index) === state.questionIndex) {
          chip.classList.add('answered');
        }
      });
    }

    function showFeedbackBanner(isCorrect, correctKey, explanation) {
      // 移除旧的feedback
      document.querySelectorAll('.feedback-banner').forEach(el => el.remove());
      const feedbackHTML = `
        <div class="feedback-banner ${isCorrect ? 'correct' : 'incorrect'}">
          <span class="fb-icon">${isCorrect ? '✅' : '❌'}</span>
          <div class="fb-text">
            <strong>${isCorrect ? 'Correct!' : 'Incorrect'}</strong>
            ${!isCorrect ? ` &nbsp;正确答案是 <strong>${correctKey}</strong>` : ''}
            ${explanation ? `<div class="fb-explanation">${explanation}</div>` : ''}
          </div>
        </div>`;
      // 插入到options列表后面
      const optionsList = document.querySelector('.options-list');
      if (optionsList) optionsList.insertAdjacentHTML('afterend', feedbackHTML);
    }

    // 排除 / 取消排除选项
    function excludeOption(key) {
      const section = state.sections[currentSectionIndex];
      const idx = state.questionIndex;
      if (!section.excluded[idx]) section.excluded[idx] = [];
      const arr = section.excluded[idx];
      const pos = arr.indexOf(key);
      if (pos >= 0) {
        arr.splice(pos, 1); // 取消排除
      } else {
        arr.push(key);       // 排除
        // 排除时若恰好是当前选中，清除选中
        if (section.answers[idx] === key) {
          section.answers[idx] = null;
        }
      }
      saveState(examId, state);
      // 更新当前行样式
      document.querySelectorAll('.option-row').forEach(row => {
        if (row.dataset.key === key) {
          row.classList.toggle('is-excluded', arr.includes(key));
          row.classList.toggle('selected', false);
          // 更新排除按钮状态
          const btn = row.querySelector('.opt-exclude-btn');
          if (btn) btn.classList.toggle('is-active', arr.includes(key));
        }
      });
    }

    // 展示确认弹窗
    function showConfirm(title, body, onConfirm) {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-body').textContent = body;
      document.getElementById('confirm-modal').classList.add('show');
      document.getElementById('confirm-ok').onclick = () => {
        document.getElementById('confirm-modal').classList.remove('show');
        onConfirm();
      };
      document.getElementById('confirm-cancel').onclick = () => {
        document.getElementById('confirm-modal').classList.remove('show');
      };
    }

    // 标记
    function toggleFlag() {
      const section = state.sections[currentSectionIndex];
      section.flagged[state.questionIndex] = !section.flagged[state.questionIndex];
      saveState(examId, state);
      document.getElementById('btn-flag').className = section.flagged[state.questionIndex] ? 'btn btn-flagged' : 'btn';

      // 更新导航芯片
      document.querySelectorAll('.nav-chip').forEach(chip => {
        if (parseInt(chip.dataset.section) === currentSectionIndex &&
            parseInt(chip.dataset.index) === state.questionIndex) {
          chip.classList.toggle('flagged', section.flagged[state.questionIndex]);
        }
      });
    }

    // 上一题/下一题
    function prevQuestion() {
      if (state.questionIndex > 0) {
        state.questionIndex--;
      }
      saveState(examId, state);
      renderQuestion();
    }

    function nextQuestion() {
      const section = exam.sections[currentSectionIndex];
      if (state.questionIndex < section.questions.length - 1) {
        state.questionIndex++;
        saveState(examId, state);
        renderQuestion();
      } else {
        // On last question: show review summary instead of auto-advance
        showReviewSummary();
      }
    }

    // 计时器
    function updateTimerDisplay(remaining) {
      const timerEl = document.getElementById('timer');
      timerEl.textContent = formatTime(remaining);
      timerEl.className = 'timer' + (remaining < 300 ? ' danger' : remaining < 600 ? ' warning' : '');
      state.sections[currentSectionIndex].timeRemainingSec = remaining;
    }

    // 提交当前部分
    function submitSection() {
      timer.stop();
      state.sections[currentSectionIndex].status = 'completed';

      if (currentSectionIndex < exam.sections.length - 1) {
        currentSectionIndex++;
        state.questionIndex = 0;
        state.sections[currentSectionIndex].status = 'in_progress';
        timer.start(state.sections[currentSectionIndex].timeRemainingSec);
        saveState(examId, state);
        renderQuestion();
        renderNavigator();
      } else {
        showResults();
      }
    }

    // 显示结果
    function showResults() {
      const results = calculateResults(exam, state);
      const { totalCorrect, totalQuestions, accuracy, wrongQuestions, sections } = results;

      // 保存每道错题到错题本
      wrongQuestions.forEach(q => saveWrongQuestion(q));

      // 保存完成的练习记录（供仪表盘读取）
      try {
        const sessions = JSON.parse(localStorage.getItem('ap-learning-sessions') || '[]');
        sessions.unshift({
          examId,
          name: exam.exam_title || 'AP Practice',
          completedAt: new Date().toISOString(),
          answered: totalQuestions,
          total: exam.sections.reduce((s, sec) => s + sec.questions.length, 0),
          accuracy
        });
        localStorage.setItem('ap-learning-sessions', JSON.stringify(sessions.slice(0, 20)));
      } catch(e) {}

      // ★ 写入 AP_USER_PROGRESS — 结构化 per-Unit 进度
      try {
        updateUserProgress(exam, state, results);
      } catch(e) { console.warn('updateUserProgress failed:', e); }

      document.getElementById('exam-layout').innerHTML = `
        <div class="results-panel">
          <h2 style="margin-bottom: 1rem;">练习完成！</h2>
          <div class="results-score">${accuracy}%</div>
          <div class="results-label">正确率</div>

          <div class="results-details">
            <div class="result-item">
              <div class="value" style="color: var(--success);">${totalCorrect}</div>
              <div class="label">答对</div>
            </div>
            <div class="result-item">
              <div class="value">${totalQuestions - totalCorrect}</div>
              <div class="label">答错</div>
            </div>
            <div class="result-item">
              <div class="value">${totalQuestions}</div>
              <div class="label">已答</div>
            </div>
          </div>

          <div style="margin-top: 1.5rem; display: flex; gap: 1rem; justify-content: center;">
            <a href="index.html" class="btn btn-secondary">返回试卷列表</a>
            <button class="btn btn-confirm-danger" id="btn-start-over">重新开始</button>
          </div>
        </div>
      `;

      // 保存进度
      const progress = JSON.parse(localStorage.getItem('ap-learning-progress') || '{"exams":0,"questions":0,"correct":0}');
      progress.exams++;
      progress.questions += totalQuestions;
      progress.correct += totalCorrect;
      progress.accuracy = Math.round((progress.correct / progress.questions) * 100);
      localStorage.setItem('ap-learning-progress', JSON.stringify(progress));

      // 清除考试状态
      localStorage.removeItem(`ap-learning-exam:${examId}`);

      // 绑定重新开始
      document.getElementById('btn-start-over').addEventListener('click', () => {
        showConfirm(
          'Are you absolutely sure?',
          'You can start over from here. Your answer records for this exam will be lost after this operation. Are you sure?',
          () => {
            clearState(examId);
            window.location.href = `paper.html?exam=${examId}`;
          }
        );
      });
    }

    // ── Highlighting ──
    function toggleHighlightMode() {
      highlightMode = !highlightMode;
      document.getElementById('btn-highlight').classList.toggle('active', highlightMode);
      document.body.classList.toggle('highlight-mode', highlightMode);
      const qPanel = document.querySelector('.question-panel');
      if (highlightMode && qPanel) {
        qPanel.addEventListener('mouseup', handleHighlightSelection);
      } else if (qPanel) {
        qPanel.removeEventListener('mouseup', handleHighlightSelection);
      }
    }

    function handleHighlightSelection() {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed) return;
      const range = sel.getRangeAt(0);

      // Only highlight within question-panel
      const qPanel = document.querySelector('.question-panel');
      if (!qPanel || !qPanel.contains(range.startContainer) || !qPanel.contains(range.endContainer)) return;

      const selectedText = sel.toString().trim();
      if (!selectedText) return;

      // Save highlight data
      const section = state.sections[currentSectionIndex];
      const qIdx = state.questionIndex;
      if (!section.highlights) section.highlights = [];
      if (!section.highlights[qIdx]) section.highlights[qIdx] = [];
      section.highlights[qIdx].push({ text: selectedText });
      saveState(examId, state);

      // Wrap in <mark>
      try {
        const mark = document.createElement('mark');
        mark.className = 'user-highlight';
        mark.title = 'Click to remove highlight';
        range.surroundContents(mark);
        mark.addEventListener('click', () => removeHighlight(mark, selectedText));
      } catch(e) {
        // If surroundContents fails (cross-element), skip
      }
      sel.removeAllRanges();
    }

    function removeHighlight(markEl, text) {
      const section = state.sections[currentSectionIndex];
      const qIdx = state.questionIndex;
      if (section.highlights && section.highlights[qIdx]) {
        const arr = section.highlights[qIdx];
        const idx = arr.findIndex(h => h.text === text);
        if (idx >= 0) arr.splice(idx, 1);
        saveState(examId, state);
      }
      // Unwrap the mark
      const parent = markEl.parentNode;
      while (markEl.firstChild) parent.insertBefore(markEl.firstChild, markEl);
      parent.removeChild(markEl);
    }

    function reapplyHighlights() {
      const section = state.sections[currentSectionIndex];
      const qIdx = state.questionIndex;
      const highlights = section.highlights?.[qIdx] || [];
      if (highlights.length === 0) return;

      const qPanel = document.querySelector('.question-panel');
      if (!qPanel) return;

      highlights.forEach(hl => {
        // Find the text node and wrap it
        const walker = document.createTreeWalker(qPanel, NodeFilter.SHOW_TEXT, null, false);
        let node;
        while ((node = walker.nextNode())) {
          const idx = node.textContent.indexOf(hl.text);
          if (idx >= 0) {
            const range = document.createRange();
            range.setStart(node, idx);
            range.setEnd(node, idx + hl.text.length);
            try {
              const mark = document.createElement('mark');
              mark.className = 'user-highlight';
              mark.title = 'Click to remove highlight';
              range.surroundContents(mark);
              mark.addEventListener('click', () => removeHighlight(mark, hl.text));
            } catch(e) {}
            break; // Only first match per highlight entry
          }
        }
      });
    }

    // ── Review Summary ──
    function showReviewSummary() {
      showingReview = true;
      const section = state.sections[currentSectionIndex];
      const secData = exam.sections[currentSectionIndex];
      const totalQ = secData.questions.length;
      const answered = section.answers.filter(a => a !== null).length;
      const flagged = section.flagged.filter(Boolean).length;
      const unanswered = totalQ - answered;

      const layout = document.getElementById('exam-layout');
      layout.innerHTML = `
        <div class="review-summary" style="grid-column: 1 / -1;">
          <h2>📋 ${secData.part_label} — Review</h2>
          <div class="review-meta">
            Time remaining: <strong>${formatTime(timer ? section.timeRemainingSec : 0)}</strong>
            &nbsp;·&nbsp; ${exam.exam_title}
          </div>
          <div class="review-stats">
            <div class="review-stat"><div class="dot answered"></div> Answered: ${answered}/${totalQ}</div>
            <div class="review-stat"><div class="dot flagged"></div> Flagged: ${flagged}</div>
            <div class="review-stat"><div class="dot empty"></div> Unanswered: ${unanswered}</div>
          </div>
          <div class="review-grid">
            ${secData.questions.map((q, i) => {
              const isAnswered = section.answers[i] !== null;
              const isFlagged = section.flagged[i];
              let icon = '';
              if (isFlagged) icon = '★';
              else if (!isAnswered) icon = '○';
              return `<div class="review-chip ${isAnswered ? 'answered' : ''} ${isFlagged ? 'flagged' : ''}"
                           data-index="${i}">
                ${i + 1}
                ${icon ? `<span class="chip-icon">${icon}</span>` : ''}
              </div>`;
            }).join('')}
          </div>
          <div class="review-actions">
            <button class="btn" id="review-back">← Back to Questions</button>
            <button class="btn btn-submit-section" id="review-submit">Submit Section ✓</button>
          </div>
        </div>
      `;

      // Back button
      document.getElementById('review-back').addEventListener('click', () => {
        showingReview = false;
        renderQuestion();
      });

      // Submit button
      document.getElementById('review-submit').addEventListener('click', () => {
        showConfirm(
          'Confirm Submit',
          'Submit this section? You cannot change answers after submission.',
          () => {
            showingReview = false;
            submitSection();
          }
        );
      });

      // Click on review chip to go to that question
      document.querySelectorAll('.review-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          state.questionIndex = parseInt(chip.dataset.index);
          showingReview = false;
          saveState(examId, state);
          renderQuestion();
        });
      });
    }

    // 辅助函数
    function getAnsweredCount() {
      const section = state.sections[currentSectionIndex];
      return section.answers.filter(a => a !== null).length;
    }

    function getTotalCount() {
      return exam.sections[currentSectionIndex].questions.length;
    }

    // 加载 KaTeX 后初始化
    function initWhenReady() {
      if (window.katex) {
        init();
      } else {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js';
        script.onload = () => init();
        script.onerror = () => init(); // 即使加载失败也继续
        document.head.appendChild(script);
      }
    }
    initWhenReady();
  </script>
</body>
</html>
