<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AP Learning - 正式版</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script>
    var m = location.pathname.match(/^\/(AP-Learning-Web-0\d)(?:\/|$)/);
    window._b = m ? '/' + m[1] : '';
  </script>
  <script>document.write('<scr'+'ipt src="'+window._b+'/assets/site-base.js"><\/scr'+'ipt>');</script>
  <link rel="stylesheet" href="../assets/global-theme.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { overflow-x: hidden; }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    .hero {
      text-align: center;
      padding: 4rem 2rem;
      background: linear-gradient(135deg, var(--card-bg) 0%, #0f172a 100%);
      border-radius: var(--radius-lg);
      margin-bottom: 2rem;
    }
    .hero h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    .hero p { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 2rem; }
    .hero-actions { display: flex; gap: 1rem; justify-content: center; }

    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-secondary:hover { background: #475569; }

    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 2rem 0;
    }
    .subject-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid var(--border);
      transition: all 0.2s;
      cursor: pointer;
    }
    .subject-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .subject-card h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .subject-card .meta { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; }
    .mastery-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin: 0.75rem 0; }
    .mastery-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
    .mastery-fill.high { background: var(--success); }
    .mastery-fill.mid { background: var(--warning); }
    .mastery-fill.low { background: var(--danger); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      padding: 2rem 0;
    }
    .stat-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      border: 1px solid var(--border);
    }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat-card .label { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }

    .quick-start {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 2rem 0;
    }
    .quick-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 2rem;
      border: 1px solid var(--border);
    }
    .quick-card h3 { margin-bottom: 1rem; }
    .quick-card .exams { margin-top: 1rem; }
    .exam-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      border-radius: 6px;
      background: var(--bg);
      margin-bottom: 0.5rem;
    }
    .exam-item:hover { background: var(--border); }
    .exam-item .name { font-weight: 500; }
    .exam-item .year { color: var(--text-muted); font-size: 0.85rem; }

    @media (max-width: 720px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .quick-start { grid-template-columns: 1fr; }
      .subjects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="shell nav">
      <a class="brand" id="nav-brand">
        <span class="brand-mark">AP</span>
        <span class="brand-copy">
          <span class="brand-title">AP Practice Website</span>
          <span class="brand-subtitle">自用 AP 练习站</span>
        </span>
      </a>
      <nav class="nav-main" aria-label="Primary">
        <a class="is-active" id="nav-home">首页</a>
        <a id="nav-mock">套题模考</a>
        <a id="nav-training">专项训练</a>
        <a id="nav-dashboard">Dashboard</a>
      </nav>
      <a class="avatar-entry" id="nav-profile" aria-label="Open profile">
        <span class="avatar">OC</span>
        <span class="avatar-meta">
          <strong>Olivia Chen</strong>
          <span>Profile</span>
        </span>
      </a>
      <button id="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle dark mode" style="background:rgba(30,41,59,0.92);border:1px solid rgba(51,65,85,0.5);border-radius:999px;padding:10px 14px;cursor:pointer;font-size:1.1rem;box-shadow:var(--shadow-soft);">☀️</button>
    </div>
  </header>
  <script>
    document.getElementById('nav-brand').href = window.sitePath('/');
    document.getElementById('nav-home').href = window.sitePath('/');
    document.getElementById('nav-mock').href = window.sitePath('/mock/');
    document.getElementById('nav-training').href = window.sitePath('/training/');
    document.getElementById('nav-dashboard').href = window.sitePath('/dashboard/');
    document.getElementById('nav-profile').href = window.sitePath('/profile/');
  </script>

  <main class="page-main shell">
    <section class="hero">
      <h1>AP 学习平台</h1>
      <p>高效备考，自主练习，实时掌握学习进度</p>
      <div class="hero-actions">
        <a id="hero-start-exam" class="btn btn-primary">开始模考</a>
        <a id="hero-view-progress" class="btn btn-secondary">查看进度</a>
      </div>
    </section>

    <div class="stats">
      <div class="stat-card">
        <div class="value" id="total-exams">0</div>
        <div class="label">已练习试卷</div>
      </div>
      <div class="stat-card">
        <div class="value" id="total-questions">0</div>
        <div class="label">已完成题目</div>
      </div>
      <div class="stat-card">
        <div class="value" id="accuracy">0%</div>
        <div class="label">平均正确率</div>
      </div>
      <div class="stat-card">
        <div class="value" id="streak">0</div>
        <div class="label">连续学习天数</div>
      </div>
    </div>

    <h2 style="margin: 1rem 0;">快速开始</h2>
    <div class="quick-start">
      <div class="quick-card">
        <h3>最新试卷</h3>
        <div class="exams" id="recent-exams">
          <div class="exam-item">
            <div>
              <div class="name">AP Calculus BC 2018 国际卷</div>
              <div class="year">45题 | 预计 1小时45分钟</div>
            </div>
            <a id="hero-exam-link" class="btn btn-primary">做题</a>
          </div>
        </div>
      </div>
      <div class="quick-card">
        <h3>我的错题</h3>
        <div class="exams" id="recent-errors">
          <p style="color: var(--text-muted)">暂无错题记录</p>
        </div>
      </div>
    </div>

    <h2 style="margin: 1rem 0;">科目概览</h2>
    <div class="subjects-grid" id="subjects-grid"></div>
  </main>

  <footer class="shell footer">
    <p>Local AP practice workspace. Reference folders remain read-only.</p>
  </footer>

  <script type="module">
    import { loadExamIndex } from './js/data-service.js';
    import { loadUserProgress } from './js/exam-engine.js';

    // 设置Hero按钮
    document.getElementById('hero-start-exam').href = window.sitePath('/mock/');
    document.getElementById('hero-view-progress').href = window.sitePath('/dashboard/');
    document.getElementById('hero-exam-link').href = window.sitePath('/v2/exam/paper.html?exam=calc-bc-2018-intl');

    // 加载真实进度（AP_USER_PROGRESS）
    function renderHomeStats() {
      const up = loadUserProgress();
      if (up) {
        // Aggregate across all subjects
        let totalAnswered = 0, totalCorrect = 0, totalExams = up.examHistory ? up.examHistory.length : 0;
        Object.values(up.subjects).forEach(s => {
          totalAnswered += s.totalAnswered || 0;
          totalCorrect += s.totalCorrect || 0;
        });
        const accuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : 0;
        document.getElementById('total-exams').textContent = totalExams;
        document.getElementById('total-questions').textContent = totalAnswered;
        document.getElementById('accuracy').textContent = accuracy + '%';
      }
    }
    renderHomeStats();

    // 加载科目网格（真实数据驱动）
    const SUBJECTS = [
      { id: 'calculus_bc', name: 'AP Calculus BC', units: 10 },
      { id: 'calculus_ab', name: 'AP Calculus AB', units: 8 },
      { id: 'statistics', name: 'AP Statistics', units: 9 },
      { id: 'microeconomics', name: 'AP Microeconomics', units: 6 },
      { id: 'macroeconomics', name: 'AP Macroeconomics', units: 6 },
      { id: 'physics_c_mech', name: 'AP Physics C: Mechanics', units: 8 },
    ];

    const grid = document.getElementById('subjects-grid');
    grid.innerHTML = SUBJECTS.map(s => `
      <div class="subject-card" style="cursor:pointer" onclick="location.href='${window.sitePath('/v2/dashboard/?subject='+s.id)}'">
        <h3>${s.name}</h3>
        <div class="meta">${s.units} Units</div>
        <div class="mastery-bar">
          <div class="mastery-fill" id="fill-${s.id}" style="width:0%"></div>
        </div>
        <div class="mastery-label" id="label-${s.id}" style="font-size:0.85rem;color:var(--text-muted);">尚未开始</div>
      </div>
    `).join('');

    // 用真实数据填充 mastery bar
    function renderSubjectMastery() {
      const up = loadUserProgress();
      if (!up) return;
      SUBJECTS.forEach(s => {
        const sub = up.subjects[s.id];
        if (!sub) return;
        const fill = sub.accuracy;
        const el = document.getElementById('fill-' + s.id);
        const label = document.getElementById('label-' + s.id);
        if (el) {
          el.style.width = fill + '%';
          el.className = 'mastery-fill ' + (fill >= 60 ? 'high' : fill >= 30 ? 'mid' : 'low');
        }
        if (label) {
          label.textContent = fill > 0 ? `掌握度 ${fill}%` : '尚未开始';
        }
      });
    }
    renderSubjectMastery();

    // 加载最近错题
    function renderRecentWrong() {
      const wqRaw = localStorage.getItem('ap-learning-wrong-questions');
      const wq = wqRaw ? JSON.parse(wqRaw) : [];
      const container = document.getElementById('recent-errors');
      if (wq.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted)">暂无错题记录</p>';
        return;
      }
      container.innerHTML = wq.slice(0, 3).map(w => `
        <div class="exam-item">
          <div>
            <div class="name">${w.exam_id} · Q${w.questionIndex + 1}</div>
            <div class="year">${w.knowledge_points ? w.knowledge_points.join(', ') : '—'}</div>
          </div>
          <a href="${window.sitePath('/v2/exam/paper.html?exam=' + w.exam_id)}" class="btn" style="font-size:0.78rem;padding:4px 12px;">复习</a>
        </div>
      `).join('');
    }
    renderRecentWrong();
  </script>
</body>
</html>
