<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习面板 - AP Learning</title>
  <script>
    var m = location.pathname.match(/^\/(AP-Learning-Web-0\d)(?:\/|$)/);
    window._b = m ? '/' + m[1] : '';
  </script>
  <script>document.write('<scr'+'ipt src="'+window._b+'/assets/site-base.js"><\/scr'+'ipt>');</script>
  <link rel="stylesheet" href="../../assets/global-theme.css">
  <style>
    body { overflow-x: hidden; }
  </style>
</head>
<body data-page="v2-dashboard">
  <header class="site-header">
    <div class="shell nav">
      <a class="brand" id="nav-brand">
        <span class="brand-mark">AP</span>
        <span class="brand-copy">
          <span class="brand-title">AP Practice Website</span>
          <span class="brand-subtitle">自用 AP 练习站</span>
        </span>
      </a>
      <nav class="nav-main" aria-label="Primary">
        <a id="nav-home">首页</a>
        <a id="nav-mock">套题模考</a>
        <a id="nav-training">专项训练</a>
        <a id="nav-wrong">错题本</a>
        <a class="is-active" id="nav-dashboard">Dashboard</a>
      </nav>
      <a class="avatar-entry" id="nav-profile" aria-label="Open profile">
        <span class="avatar">OC</span>
        <span class="avatar-meta">
          <strong>Olivia Chen</strong>
          <span>Profile</span>
        </span>
      </a>
      <button id="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle dark mode" style="background:rgba(30,41,59,0.92);border:1px solid rgba(51,65,85,0.5);border-radius:999px;padding:10px 14px;cursor:pointer;font-size:1.1rem;box-shadow:var(--shadow-soft);">☀️</button>
    </div>
  </header>
  <script>
    document.getElementById('nav-brand').href = window.sitePath('/');
    document.getElementById('nav-home').href = window.sitePath('/');
    document.getElementById('nav-mock').href = window.sitePath('/mock/');
    document.getElementById('nav-training').href = window.sitePath('/training/');
    document.getElementById('nav-wrong').href = window.sitePath('/v2/exam/wrong-notebook.html');
    document.getElementById('nav-dashboard').href = window.sitePath('/dashboard/');
    document.getElementById('nav-profile').href = window.sitePath('/profile/');
  </script>

  <main class="page-main shell">

    <section class="page-heading">
      <h1>学习面板</h1>
      <p id="subtitle">查看你的学习进度和薄弱环节</p>
    </section>

    <!-- Subject Selector -->
    <div class="subject-tabs" id="subject-tabs" style="margin-bottom:24px;flex-wrap:wrap;gap:10px;"></div>

    <!-- Stats Grid -->
    <div class="dashboard-home-metrics" id="stats-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;">
      <div class="summary-card stat-card" style="padding:20px;text-align:center;">
        <div class="value" id="stat-total" style="font-size:2rem;font-weight:800;">0</div>
        <div class="label" style="color:var(--text-muted);font-size:0.85rem;margin-top:4px;">已答题数</div>
      </div>
      <div class="summary-card stat-card" style="padding:20px;text-align:center;">
        <div class="value" id="stat-accuracy" style="font-size:2rem;font-weight:800;color:var(--success);">0%</div>
        <div class="label" style="color:var(--text-muted);font-size:0.85rem;margin-top:4px;">平均正确率</div>
      </div>
      <div class="summary-card stat-card" style="padding:20px;text-align:center;">
        <div class="value" id="stat-exams" style="font-size:2rem;font-weight:800;">0</div>
        <div class="label" style="color:var(--text-muted);font-size:0.85rem;margin-top:4px;">已完成试卷</div>
      </div>
      <div class="summary-card stat-card" style="padding:20px;text-align:center;">
        <div class="value" id="stat-mastery" style="font-size:2rem;font-weight:800;color:var(--primary);">—</div>
        <div class="label" style="color:var(--text-muted);font-size:0.85rem;margin-top:4px;">整体掌握度</div>
      </div>
    </div>

    <!-- Two-column layout -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">

      <!-- Unit Progress Panel -->
      <div class="page-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px;border-bottom:1px solid var(--line);">
          <span style="font-size:1rem;font-weight:700;">Unit 掌握度</span>
          <span id="unit-count" style="font-size:0.8rem;color:var(--text-muted);"></span>
        </div>
        <div id="unit-list" style="padding:12px 18px;">
          <div class="empty-state" id="unit-empty">选择科目查看 Unit 进度</div>
        </div>
      </div>

      <!-- Recent Activity Panel -->
      <div class="page-panel">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px;border-bottom:1px solid var(--line);">
          <span style="font-size:1rem;font-weight:700;">最近练习</span>
        </div>
        <div id="activity-list" style="padding:12px 18px;">
          <div class="empty-state">暂无练习记录</div>
        </div>
      </div>

    </div>

    <!-- Weak Points -->
    <div class="page-panel" style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px;border-bottom:1px solid var(--line);">
        <span style="font-size:1rem;font-weight:700;">薄弱知识点</span>
        <span id="weak-count" style="font-size:0.8rem;color:var(--text-muted);"></span>
      </div>
      <div id="weak-points" style="padding:12px 18px;">
        <div class="empty-state" id="weak-empty">完成更多练习后，这里会显示你需要加强的知识点</div>
      </div>
    </div>

    <!-- Exam History -->
    <div class="page-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px;border-bottom:1px solid var(--line);">
        <span style="font-size:1rem;font-weight:700;">历史成绩</span>
      </div>
      <div id="history-list" style="padding:12px 18px;">
        <div class="empty-state">暂无历史记录</div>
      </div>
    </div>

  </main>

  <footer class="shell footer">
    <p>Local AP practice workspace. Reference folders remain read-only.</p>
  </footer>

  <style>
    @media (max-width: 900px) {
      .dashboard-home-metrics { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 720px) {
      .dashboard-home-metrics { grid-template-columns: 1fr 1fr; }
    }
    .stat-card { transition: transform 0.15s; }
    .stat-card:hover { transform: translateY(-2px); }

    .unit-row { display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); }
    .unit-row:last-child { border-bottom:none; }
    .unit-left { display:flex; flex-direction:column; gap:4px; }
    .unit-name { font-size:0.85rem; font-weight:600; line-height:1.3; }
    .unit-bar-wrap { height:6px; background:var(--bg); border-radius:3px; overflow:hidden; width:140px; }
    .unit-bar-fill { height:100%; border-radius:3px; transition:width 0.4s ease; }
    .unit-bar-fill.high { background:var(--success); }
    .unit-bar-fill.mid { background:var(--warning); }
    .unit-bar-fill.low { background:var(--danger); }
    .unit-bar-fill.none { background:var(--text-muted); opacity:0.3; }
    .unit-pct { font-size:0.85rem; color:var(--text-muted); min-width:36px; text-align:right; }
    .mastery-score { display:inline-flex; align-items:center; justify-content:center; min-width:36px; min-height:24px; padding:0 8px; border-radius:999px; font-size:0.75rem; font-weight:800; }
    .mastery-score.mastered { background:rgba(34,197,94,0.15); color:var(--success); }
    .mastery-score.strong { background:rgba(59,130,246,0.15); color:#60a5fa; }
    .mastery-score.warm { background:rgba(245,158,11,0.15); color:#f59e0b; }
    .mastery-score.muted { background:rgba(156,163,175,0.15); color:var(--text-muted); }
    .mastery-score.none { background:rgba(156,163,175,0.1); color:var(--text-muted); opacity:0.5; }
    .unit-actions { display:flex; gap:6px; }
    .ghost-btn { padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:0.78rem; cursor:pointer; transition:all 0.15s; }
    .ghost-btn:hover { border-color:var(--accent); color:var(--accent); }
    .weak-point-tag { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px; background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:var(--danger); font-size:0.82rem; font-weight:700; }
    .weak-point-tag .kp-name { }
    .weak-point-tag .kp-count { font-size:0.72rem; opacity:0.7; }
    .activity-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--line); }
    .activity-item:last-child { border-bottom:none; }
    .activity-name { font-weight:600; font-size:0.9rem; }
    .activity-meta { color:var(--text-muted); font-size:0.78rem; margin-top:2px; }
    .activity-score { font-weight:700; font-size:0.92rem; }
    .activity-score.good { color:var(--success); }
    .activity-score.ok { color:var(--warning); }
    .activity-score.bad { color:var(--danger); }
    .history-item { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid var(--line); }
    .history-item:last-child { border-bottom:none; }
    .history-name { font-weight:600; font-size:0.9rem; }
    .history-meta { color:var(--text-muted); font-size:0.78rem; margin-top:2px; }
    .history-accuracy { font-weight:800; font-size:1rem; }
    .inject-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:999px; background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.3); color:#60a5fa; font-size:0.82rem; font-weight:700; cursor:pointer; transition:all 0.2s; }
    .inject-btn:hover { background:rgba(59,130,246,0.2); }
    .empty-prompt { display:flex; flex-direction:column; align-items:center; gap:12px; padding:24px; text-align:center; }
    .empty-prompt p { color:var(--text-muted); font-size:0.88rem; }
  </style>

  <script type="module">
    import { loadUserProgress } from '../js/exam-engine.js';

    // ─── Subject definitions (CB 2024-2025 / 2025-2026 CED official) ──
    // Source: ap-syllabus-config.json (CB official Course and Exam Descriptions)
    const SUBJECTS = {
      calculus_bc: {
        display: '微积分 BC',
        units: [
          'Unit 1: Limits and Continuity',
          'Unit 2: Differentiation: Definition and Fundamental Properties',
          'Unit 3: Differentiation: Composite, Implicit, and Inverse Functions',
          'Unit 4: Contextual Applications of Differentiation',
          'Unit 5: Analytical Applications of Differentiation',
          'Unit 6: Integration and Accumulation of Change',
          'Unit 7: Differential Equations',
          'Unit 8: Applications of Integration',
          'Unit 9: Parametric Equations, Polar Coordinates, and Vector-Valued Functions',
          'Unit 10: Infinite Sequences and Series'
        ]
      },
      calculus_ab: {
        display: '微积分 AB',
        units: [
          'Unit 1: Limits and Continuity',
          'Unit 2: Differentiation: Definition and Fundamental Properties',
          'Unit 3: Differentiation: Composite, Implicit, and Inverse Functions',
          'Unit 4: Contextual Applications of Differentiation',
          'Unit 5: Analytical Applications of Differentiation',
          'Unit 6: Integration and Accumulation of Change',
          'Unit 7: Differential Equations',
          'Unit 8: Applications of Integration'
        ]
      },
      statistics: {
        display: '统计学',
        units: [
          'Unit 1: Exploring One-Variable Data',
          'Unit 2: Exploring Two-Variable Data',
          'Unit 3: Collecting Data',
          'Unit 4: Probability, Random Variables, and Probability Distributions',
          'Unit 5: Sampling Distributions',
          'Unit 6: Inference for Categorical Data: Proportions',
          'Unit 7: Inference for Quantitative Data: Means',
          'Unit 8: Inference for Categorical Data: Chi-Square',
          'Unit 9: Inference for Quantitative Data: Slopes'
        ]
      },
      csa: {
        display: '计算机科学 A',
        units: [
          'Unit 1: Using Objects and Methods',
          'Unit 2: Selection and Iteration',
          'Unit 3: Class Creation',
          'Unit 4: Data Collections'
        ]
      },
      physics_c_mech: {
        display: '物理 C 力学',
        units: [
          'Unit 1: Kinematics',
          'Unit 2: Force and Translational Dynamics',
          'Unit 3: Work, Energy, and Power',
          'Unit 4: Linear Momentum',
          'Unit 5: Torque and Rotational Dynamics',
          'Unit 6: Energy and Momentum of Rotating Systems',
          'Unit 7: Oscillations'
        ]
      },
      physics_c_em: {
        display: '物理 C 电磁学',
        units: [
          "Unit 8: Electric Charges, Fields, and Gauss's Law",
          'Unit 9: Electric Potential',
          'Unit 10: Conductors and Capacitors',
          'Unit 11: Electric Circuits',
          'Unit 12: Magnetic Fields and Electromagnetism',
          'Unit 13: Electromagnetic Induction'
        ]
      },
      microeconomics: {
        display: '微观经济',
        units: [
          'Unit 1: Basic Economic Concepts',
          'Unit 2: Supply and Demand',
          'Unit 3: Production, Cost, and the Perfect Competition Model',
          'Unit 4: Imperfect Competition',
          'Unit 5: Factor Markets',
          'Unit 6: Market Failure and the Role of Government'
        ]
      },
      macroeconomics: {
        display: '宏观经济',
        units: [
          'Unit 1: Basic Economic Concepts',
          'Unit 2: Economic Indicators and the Business Cycle',
          'Unit 3: National Income and Price Determination',
          'Unit 4: Financial Sector',
          'Unit 5: Long-Run Consequences of Stabilization Policies',
          'Unit 6: Open Economy—International Trade and Finance'
        ]
      },
      psychology: {
        display: '心理学',
        units: [
          'Unit 1: Biological Bases of Behavior',
          'Unit 2: Cognition',
          'Unit 3: Development and Learning',
          'Unit 4: Social Psychology and Personality',
          'Unit 5: Mental and Physical Health'
        ]
      }
    };

    // ─── AP exam date ───────────────────────────────────────────────
    function getExamDate(year) { return new Date(year, 4, 15); }
    function getDaysLeft(target) { return Math.max(0, Math.ceil((target - new Date()) / 86400000)); }
    function fmtDate(date) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${months[date.getMonth()]} ${date.getDate()}`;
    }

    // ─── Mastery helpers ─────────────────────────────────────────────
    function masteryClass(score) {
      if (score === null || score === undefined || score === 0) return 'none';
      if (score >= 4.5) return 'mastered';
      if (score >= 3.5) return 'strong';
      if (score >= 2.0) return 'warm';
      return 'muted';
    }
    function masteryLabel(score) {
      if (score === null || score === undefined || score === 0) return '—';
      return score.toFixed(1);
    }
    function accuracyColor(pct) {
      if (pct >= 70) return 'good';
      if (pct >= 40) return 'ok';
      return 'bad';
    }
    function barClass(pct) {
      if (pct === 0 || pct === null) return 'none';
      if (pct >= 70) return 'high';
      if (pct >= 40) return 'mid';
      return 'low';
    }

    // ─── State ──────────────────────────────────────────────────────
    let currentSubject = 'calculus_bc';

    // ─── Render subject tabs ─────────────────────────────────────────
    function renderSubjectTabs() {
      const container = document.getElementById('subject-tabs');
      const examYear = new Date().getFullYear();
      const examDate = getExamDate(examYear);
      const daysLeft = getDaysLeft(examDate);
      const dateStr = fmtDate(examDate);

      container.innerHTML = Object.entries(SUBJECTS).map(([id, sub]) => {
        const active = id === currentSubject ? ' is-active' : '';
        const countdown = (id === currentSubject) ? ` <span style="font-size:0.72rem;color:var(--text-muted);font-weight:400;">· ${daysLeft}d (${dateStr})</span>` : '';
        return `<button class="subject-tab${active}" data-subject="${id}" style="min-height:36px;padding:0 14px;font-size:0.88rem;">${sub.display}${countdown}</button>`;
      }).join('');

      container.querySelectorAll('.subject-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          container.querySelectorAll('.subject-tab').forEach(b => b.classList.remove('is-active'));
          btn.classList.add('is-active');
          currentSubject = btn.dataset.subject;
          renderAll();
        });
      });
    }

    // ─── Render stats ────────────────────────────────────────────────
    function renderStats(progress) {
      if (!progress || !progress.subjects[currentSubject]) {
        document.getElementById('stat-total').textContent = '0';
        document.getElementById('stat-accuracy').textContent = '0%';
        document.getElementById('stat-exams').textContent = String(progress?.examHistory?.length || 0);
        document.getElementById('stat-mastery').textContent = '—';
        return;
      }
      const sub = progress.subjects[currentSubject];
      document.getElementById('stat-total').textContent = sub.totalAnswered;
      document.getElementById('stat-accuracy').textContent = sub.accuracy + '%';
      document.getElementById('stat-exams').textContent = String(progress.examHistory.filter(h => h.subject === currentSubject).length);

      // Average mastery
      const units = Object.values(sub.units).filter(u => u.answered > 0);
      if (units.length > 0) {
        const avgMastery = units.reduce((sum, u) => sum + u.masteryScore, 0) / units.length;
        document.getElementById('stat-mastery').textContent = avgMastery.toFixed(1) + ' / 5.0';
      } else {
        document.getElementById('stat-mastery').textContent = '—';
      }
    }

    // ─── Render unit list ────────────────────────────────────────────
    function renderUnits(progress) {
      const container = document.getElementById('unit-list');
      const countEl = document.getElementById('unit-count');
      const subject = SUBJECTS[currentSubject];
      if (!subject) return;

      if (!progress || !progress.subjects[currentSubject]) {
        container.innerHTML = `<div class="empty-prompt">
          <p>还没有 ${subject.display} 的练习数据</p>
          <button class="inject-btn" onclick="window.injectMockData && window.injectMockData('${currentSubject}')">📊 注入示例数据</button>
          <p style="font-size:0.78rem;">（用于预览效果）</p>
        </div>`;
        countEl.textContent = '';
        return;
      }

      const sub = progress.subjects[currentSubject];

      countEl.textContent = `${Object.values(sub.units).filter(u => u.answered > 0).length}/${subject.units.length} 已练习`;

      container.innerHTML = subject.units.map(unitLabel => {
        const unit = sub.units[unitLabel];
        if (!unit || unit.answered === 0) {
          return `
          <div class="unit-row">
            <div class="unit-left">
              <span class="unit-name" style="color:var(--text-muted);">${unitLabel}</span>
              <div class="unit-bar-wrap"><div class="unit-bar-fill none" style="width:0%"></div></div>
            </div>
            <span class="mastery-score none">—</span>
            <div class="unit-actions">
              <button class="ghost-btn" onclick="window.injectMockData && window.injectMockData('${currentSubject}')">练习</button>
            </div>
          </div>`;
        }
        const pct = Math.round((unit.correct / unit.answered) * 100);
        const mScore = unit.masteryScore;
        const mClass = masteryClass(mScore);
        return `
        <div class="unit-row">
          <div class="unit-left">
            <span class="unit-name">${unitLabel}</span>
            <div class="unit-bar-wrap">
              <div class="unit-bar-fill ${barClass(pct)}" style="width:${pct}%"></div>
            </div>
          </div>
          <span class="mastery-score ${mClass}" title="Mastery Score">${masteryLabel(mScore)}</span>
          <div class="unit-actions">
            <button class="ghost-btn">练习</button>
          </div>
        </div>`;
      }).join('');
    }

    // ─── Render activity ─────────────────────────────────────────────
    function renderActivity(progress) {
      const container = document.getElementById('activity-list');
      if (!progress || !progress.examHistory || progress.examHistory.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无练习记录</div>';
        return;
      }
      const recent = progress.examHistory
        .filter(h => h.subject === currentSubject)
        .slice(0, 5);

      if (recent.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无练习记录</div>';
        return;
      }

      container.innerHTML = recent.map(h => {
        const cls = accuracyColor(h.accuracy);
        const date = h.completedAt ? new Date(h.completedAt).toLocaleDateString('zh-CN') : '';
        return `
        <div class="activity-item">
          <div>
            <div class="activity-name">${h.examTitle || h.examId}</div>
            <div class="activity-meta">${date} · ${h.correct}/${h.totalQuestions} 题</div>
          </div>
          <div class="activity-score ${cls}">${h.accuracy}%</div>
        </div>`;
      }).join('');
    }

    // ─── Render weak points ─────────────────────────────────────────
    function renderWeakPoints(progress) {
      const container = document.getElementById('weak-points');
      const countEl = document.getElementById('weak-count');
      let emptyEl = document.getElementById('weak-empty');

      if (!progress || !progress.subjects[currentSubject]) {
        if (countEl) countEl.textContent = '';
        container.querySelectorAll('.weak-point-tag').forEach(el => el.remove());
        emptyEl = document.getElementById('weak-empty');
        if (emptyEl) emptyEl.style.display = 'block';
        return;
      }

      const sub = progress.subjects[currentSubject];
      const wps = sub.weakPoints || [];

      if (wps.length === 0) {
        if (countEl) countEl.textContent = '';
        container.innerHTML = '<div class="empty-state" id="weak-empty">薄弱知识点会在练习中自动积累</div>';
        return;
      }

      if (emptyEl) emptyEl.style.display = 'none';
      if (countEl) countEl.textContent = `${wps.length} 个知识点`;
      container.innerHTML = wps.map(kp => `
        <span class="weak-point-tag">
          <span class="kp-name">${kp}</span>
        </span>
      `).join(' ');
    }

    // ─── Render history ─────────────────────────────────────────────
    function renderHistory(progress) {
      const container = document.getElementById('history-list');
      if (!progress || !progress.examHistory || progress.examHistory.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无历史记录</div>';
        return;
      }

      const recent = progress.examHistory.slice(0, 10);
      container.innerHTML = recent.map(h => {
        const cls = accuracyColor(h.accuracy);
        const date = h.completedAt ? new Date(h.completedAt).toLocaleDateString('zh-CN') : '';
        return `
        <div class="history-item">
          <div>
            <div class="history-name">${h.examTitle || h.examId}</div>
            <div class="history-meta">${date} · ${h.correct}/${h.totalQuestions} 题</div>
          </div>
          <div class="history-accuracy" style="color:var(--${cls === 'good' ? 'success' : cls === 'ok' ? 'warning' : 'danger'})">${h.accuracy}%</div>
